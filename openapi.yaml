        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Kein Teilnehmer dieser Reise
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Reise nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /trips/{id}/accommodations/{accommodationId}:
    get:
      summary: Unterkunfts-Details abrufen
      description: >
        Gibt die Details einer Unterkunft innerhalb einer Reise zurück.
        Der Nutzer muss Teilnehmer der Reise sein.
      tags: [Travel]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Reise-ID
        - name: accommodationId
          in: path
          required: true
          schema:
