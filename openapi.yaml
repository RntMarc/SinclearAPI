  /trips/{id}/participants:
    get:
      summary: Teilnehmer einer Reise auflisten
      description: >
        Gibt alle Teilnehmer einer Reise zurück.
        Der Nutzer muss selbst Teilnehmer der Reise sein.
      tags: [Travel]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Liste der Teilnehmer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TravelParticipantListResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Kein Teilnehmer dieser Reise
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Reise nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
