          description: Social-Informationen
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/UserSocialInfo'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
