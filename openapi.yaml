        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BugReportRequest'
      responses:
        '200':
          description: Bug-Report erfolgreich versendet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BugReportResponse'
        '400':
          description: Ungültige Eingabe (z.B. leerer Text)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: E-Mail-Versand fehlgeschlagen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /feedback/suggestions:
    get:
      summary: Funktionsvorschläge auflisten
      description: >
        Gibt alle Funktionsvorschläge sortiert nach Upvote-Anzahl (absteigend)
        und Erstellungsdatum (absteigend) zurück. Enthält pro Vorschlag die
        Anzahl der Upvotes und ob der aktuelle Nutzer bereits gevotet hat.
      tags: [Feedback]
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Seitennummer
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Einträge pro Seite
      responses:
        '200':
          description: Paginierte Liste der Vorschläge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackSuggestionListResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Funktionsvorschlag erstellen
      description: >
        Erstellt einen neuen Funktionsvorschlag. Der eingeloggte Nutzer
        wird als Ersteller gespeichert. Der Status ist standardmäßig "submitted".
      tags: [Feedback]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackSuggestionCreateRequest'
      responses:
        '201':
          description: Vorschlag erfolgreich erstellt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackSuggestionCreateResponse'
        '400':
          description: Ungültige Eingabe (z.B. leerer Titel)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /feedback/suggestions/{id}:
    delete:
      summary: Funktionsvorschlag löschen
      description: >
        Löscht einen Funktionsvorschlag. Der Ersteller darf seinen eigenen
        Vorschlag nur löschen, wenn dieser weniger als 3 Upvotes hat.
        Administratoren dürfen jeden Vorschlag löschen.
      tags: [Feedback]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID des Vorschlags
      responses:
        '204':
          description: Vorschlag erfolgreich gelöscht
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Kein Recht zum Löschen (nicht Eigentümer oder zu viele Upvotes)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Vorschlag nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /feedback/suggestions/{id}/vote:
    post:
      summary: Upvote für Funktionsvorschlag geben
      description: >
        Gibt einen Upvote für einen Funktionsvorschlag ab. Pro Nutzer und
        Vorschlag ist nur ein Upvote möglich.
      tags: [Feedback]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID des Vorschlags
      responses:
        '204':
