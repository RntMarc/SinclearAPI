        Gibt die Kontaktmöglichkeiten des angemeldeten Nutzers zurück,
        inklusive Sichtbarkeitseinstellungen.
      tags: [User]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Kontakt-Informationen
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/UserContactInfo'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/{userId}:
    get:
      summary: Benutzerprofil abrufen (öffentlich)
      description: >
        Gibt die Profildaten eines anderen Nutzers zurück.
        Nicht sichtbare Felder werden weggelassen.
        Die Sichtbarkeit richtet sich nach den Einstellungen des angefragten Nutzers
        und der engen-Freunde-Beziehung.
      tags: [User]
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID des angefragten Nutzers
      responses:
        '200':
          description: Öffentliche Profildaten
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailPublicResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Nutzer nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/{userId}/base:
    get:
      summary: Basis-Profildaten eines Nutzers abrufen
      description: >
        Gibt die Basis-Profildaten eines anderen Nutzers zurück.
        E-Mail und Geburtstag werden nur angezeigt, wenn die Sichtbarkeit dies erlaubt.
      tags: [User]
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Öffentliche Basis-Profildaten
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/UserBasePublic'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Nutzer nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/{userId}/social:
    get:
      summary: Social-Informationen eines Nutzers abrufen
      description: >
        Gibt die Social-Media-Handles eines anderen Nutzers zurück.
        Es werden nur die Handles angezeigt, deren Sichtbarkeitseinstellung dies erlaubt.
      tags: [User]
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Öffentliche Social-Informationen
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/UserSocialInfoPublic'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Nutzer nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/{userId}/contact:
    get:
      summary: Kontakt-Informationen eines Nutzers abrufen
      description: >
        Gibt die Kontaktmöglichkeiten eines anderen Nutzers zurück.
        Es werden nur die Felder angezeigt, deren Sichtbarkeitseinstellung dies erlaubt.
      tags: [User]
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Öffentliche Kontakt-Informationen
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/UserContactInfoPublic'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Nutzer nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/me/profile:
    put:
      summary: Eigenes Profil aktualisieren
      description: >
        Aktualisiert beliebig viele Felder des eigenen Profils gleichzeitig.
        Es werden nur die im Request Body gesendeten Felder aktualisiert.
        Jedes Feld wird individuell validiert.
      tags: [User]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        '200':
          description: Aktualisierte Profildaten
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailResponse'
        '400':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/me/email/request:
    post:
      summary: E-Mail-Änderung anfordern
      description: >
        Sendet einen 6-stelligen OTP-Code an die neue E-Mail-Adresse.
        Die neue Adresse darf noch nicht in der Datenbank existieren.
      tags: [User]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailChangeRequest'
      responses:
        '200':
          description: OTP wurde an die neue Adresse gesendet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Ungültige oder bereits vergebene E-Mail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Zu viele Anfragen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/me/email/verify:
    post:
      summary: E-Mail-Änderung bestätigen
      description: >
        Bestätigt die E-Mail-Änderung mit dem per OTP erhaltenen Code.
        Die E-Mail wird in der Datenbank aktualisiert und alle
        bestehenden Refresh-Tokens werden ungültig gemacht.
      tags: [User]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailChangeVerifyRequest'
      responses:
        '200':
          description: E-Mail wurde aktualisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Ungültiger oder abgelaufener Code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/me/discord/start:
    post:
      summary: Discord-Relink starten
      description: >
        Startet den OAuth2-Fluss zum Verknüpfen eines neuen Discord-Accounts.
        Gibt eine Discord-Autorisierungs-URL zurück.
      tags: [User]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Discord-OAuth-URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscordStartResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/me/discord/callback:
    get:
      summary: Discord-Relink-Callback
      description: >
        Wird von Discord nach erfolgreicher Autorisierung aufgerufen.
        Zeigt einen 6-stelligen Pairing-Code an, der in der App eingegeben
        werden muss. Dieser Endpunkt ist als Browser-Redirect-URL konfiguriert.
      tags: [User]
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Von Discord ausgestellter Autorisierungscode
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: State-Parameter (UUID) zur CSRF-Absicherung
      responses:
        '200':
          description: HTML-Seite mit Pairing-Code
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Fehler bei der Autorisierung
          content:
            text/html:
              schema:
                type: string

  /user/me/discord/verify:
    post:
      summary: Discord-Relink bestätigen
      description: >
        Bestätigt die Discord-Verknüpfung mit dem per Callback erhaltenen
        6-stelligen Pairing-Code. Die Discord-ID wird in der Datenbank
        aktualisiert.
      tags: [User]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscordVerifyRequest'
      responses:
        '200':
          description: Discord-Account wurde aktualisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Ungültiger oder abgelaufener Code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/me/visibility:
    put:
      summary: Sichtbarkeitseinstellungen aktualisieren
      description: >
        Aktualisiert die Sichtbarkeitseinstellungen für beliebig viele
        Profilfelder gleichzeitig. Erlaubte Werte: 0 (nur ich), 1 (alle),
        2 (nur enge Freunde).
      tags: [User]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VisibilityUpdateRequest'
      responses:
        '200':
          description: Sichtbarkeitseinstellungen aktualisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Ungültiges Feld oder ungültiger Visibility-Wert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/me/onboarding/complete:
    put:
      summary: Onboarding als abgeschlossen markieren
      description: >
        Setzt das Feld `onboardingCompleted` des angemeldeten Nutzers
        auf `true`. Wird vom Client aufgerufen, nachdem der Nutzer den
        Onboarding-Prozess durchlaufen hat.
      tags: [User]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Onboarding als abgeschlossen markiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /explore:
    get:
      summary: Orte auflisten
      description: >
        Gibt eine paginierte Liste aller Entdecken-Orte zurück.
        Optional filterbar nach Kategorie.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [gastronomy, leisure]
          description: Filter nach Kategorie
        - name: cuisine
          in: query
          required: false
          schema:
            type: string
          description: Filter nach Küchen-Typ (nur bei Gastronomie)
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [name_asc, name_desc, created_asc, created_desc, rating_asc, rating_desc]
          description: Sortierung der Ergebnisse
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginierte Liste der Orte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreListResponse'
        '400':
          description: Ungültige Kategorie oder Sortierung
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert (fehlender oder ungültiger Token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Neuen Ort anlegen
      description: >
        Legt einen neuen Entdecken-Ort an. Der Client übergibt die
        OSM-ID und den OSM-Typ. Die API ruft die Detaildaten
        von Nominatim/OpenStreetMap ab, bestimmt die Kategorie
        automatisch und speichert den Ort.
      tags: [Explore]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExploreCreateRequest'
      responses:
        '201':
          description: Ort wurde angelegt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreDetailResponse'
        '400':
          description: Ungültige OSM-ID oder OSM-Typ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Ort existiert bereits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /explore/search:
    get:
      summary: Orte durchsuchen
      description: >
        Durchsucht die Entdecken-Orte nach Namen, Kategorie, Küche
        oder geografischer Lage. Die Umkreissuche verwendet die
        Haversine-Formel. Alternativ kann ein Ortsname (`location`)
        übergeben werden, der automatisch über Nominatim geocoded wird.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Volltextsuche im Namen
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [gastronomy, leisure]
        - name: cuisine
          in: query
          required: false
          schema:
            type: string
          description: Küchen-Typ (nur bei Gastronomie)
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [name_asc, name_desc, created_asc, created_desc, rating_asc, rating_desc]
          description: Sortierung der Ergebnisse. Bei Umkreissuche primär nach Distanz, sekundär nach diesem Sortierkriterium.
        - name: city
          in: query
          required: false
          schema:
            type: string
          description: Filtert nach Stadt (LIKE-Suche in der address-Spalte)
        - name: lat
          in: query
          required: false
          schema:
            type: number
            format: float
          description: Breitengrad für Umkreissuche
        - name: lon
          in: query
          required: false
          schema:
            type: number
            format: float
          description: Längengrad für Umkreissuche
        - name: location
          in: query
          required: false
          schema:
            type: string
          description: Ortsname (wird automatisch geocoded)
        - name: radius
          in: query
          required: false
          schema:
            type: integer
            default: 5000
            minimum: 1
            maximum: 50000
          description: Radius in Metern
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Suchergebnisse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreListResponse'
        '400':
          description: Ungültige Parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /explore/random:
    get:
      summary: Zufällige Orte abrufen
      description: >
        Gibt eine Liste zufälliger Entdecken-Orte zurück.
        Optional filterbar nach Kategorie.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [gastronomy, leisure]
          description: Filter nach Kategorie
      responses:
        '200':
          description: Liste zufälliger Orte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreListResponse'
        '400':
          description: Ungültige Kategorie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /explore/bookmarks:
    get:
      summary: Eigene Lesezeichen abrufen
      description: >
        Gibt eine paginierte Liste aller Orte zurück,
        die der angemeldete Nutzer als Lesezeichen gespeichert hat.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginierte Liste der Lesezeichen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreListResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /explore/{id}/bookmark:
    get:
      summary: Lesezeichen-Status abrufen
      description: >
        Prüft, ob der angemeldete Nutzer einen Ort
        als Lesezeichen gespeichert hat.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lesezeichen-Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookmarkStatusResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Lesezeichen setzen
      description: >
        Speichert einen Ort als Lesezeichen für den
        angemeldeten Nutzer.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Lesezeichen wurde gesetzt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookmarkActionResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Ort nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Lesezeichen existiert bereits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Lesezeichen entfernen
      description: >
        Entfernt ein Lesezeichen für den angemeldeten Nutzer.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Lesezeichen wurde entfernt
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /explore/{id}:
    get:
      summary: Ortsdetails abrufen
      description: >
        Gibt die Detaildaten eines einzelnen Entdecken-Ortes zurück.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID des Ortes
      responses:
        '200':
          description: Detaildaten des Ortes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreDetailResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Ort nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: OSM-Daten aktualisieren
      description: >
        Ruft die aktuellen OSM-Daten für einen Ort neu von
        Nominatim ab und überschreibt die gespeicherten Felder.
        Jeder authentifizierte Nutzer kann einen Refresh anstoßen.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ort wurde aktualisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreDetailResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Ort nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Ort löschen
      description: >
        Löscht einen Entdecken-Ort. Nur der Ersteller darf löschen,
        und auch nur dann, wenn noch keine Bewertungen (Reviews)
        zu diesem Ort existieren. Administratoren können immer löschen.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Ort wurde gelöscht
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Keine Berechtigung zum Löschen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Ort nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /explore/{placeId}/reviews:
    get:
      summary: Bewertungen eines Ortes abrufen
      description: >
        Gibt eine paginierte Liste aller Bewertungen zu einem
        Entdecken-Ort zurück. Authentifizierung erforderlich.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: placeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID des Ortes
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginierte Liste der Bewertungen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Ort nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Bewertung erstellen
      description: >
        Erstellt eine neue Bewertung für einen Entdecken-Ort.
        Der Nutzer kann mehrere Bewertungen pro Ort abgeben.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: placeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID des Ortes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Bewertung wurde erstellt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '400':
          description: Ungültige Bewertung (rating 1-5 erforderlich)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Ort nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /explore/{placeId}/reviews/{reviewId}:
    put:
      summary: Bewertung aktualisieren
      description: >
        Aktualisiert eine vorhandene Bewertung. Nur der
        Ersteller der Bewertung oder ein Admin darf diese ändern.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: placeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID des Ortes
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID der Bewertung
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReviewRequest'
      responses:
        '200':
          description: Bewertung wurde aktualisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '400':
          description: Ungültige Bewertung (rating 1-5 erforderlich)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Keine Berechtigung (nur der Ersteller darf ändern)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Reise nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notifications:
    get:
      summary: Benachrichtigungen abrufen
      description: >
        Gibt alle Benachrichtigungen des authentifizierten Nutzers zurück.
        Unterstützt Polling über den `since`-Parameter.
      tags: [Notifications]
      security:
        - BearerAuth: []
      parameters:
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: UTC-Zeitstempel im Format `YYYY-MM-DD HH:MM:SS` - gibt nur Benachrichtigungen zurück, die danach erstellt wurden
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Maximale Anzahl an Benachrichtigungen
      responses:
        '200':
          description: Liste der Benachrichtigungen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Alle Benachrichtigungen als gelesen markieren
      description: >
        Löscht alle Benachrichtigungen des authentifizierten Nutzers.
      tags: [Notifications]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Anzahl gelöschter Benachrichtigungen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationDeleteResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notifications/{id}:
    get:
      summary: Einzelne Benachrichtigung abrufen
      description: >
        Gibt eine einzelne Benachrichtigung anhand ihrer ID zurück.
      tags: [Notifications]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Benachrichtigungs-ID
      responses:
        '200':
          description: Benachrichtigung
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Notification'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Benachrichtigung nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Benachrichtigung als gelesen markieren
      description: >
        Löscht eine einzelne Benachrichtigung (markiert als gelesen).
      tags: [Notifications]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Benachrichtigungs-ID
      responses:
        '204':
          description: Benachrichtigung gelöscht
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Benachrichtigung nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notifications/devices:
    get:
      summary: Registrierte Geräte auflisten
      description: >
        Gibt alle Geräte des authentifizierten Nutzers zurück,
        die für Push-Benachrichtigungen registriert sind.
      tags: [Notifications]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Liste der Geräte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceListResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Gerät für Push-Benachrichtigungen registrieren
      description: >
        Registriert ein Gerät für FCM-Push-Benachrichtigungen.
        Wenn das Gerät bereits existiert (gleicher Token), wird die letzte Aktivität aktualisiert.
      tags: [Notifications]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceRegisterRequest'
      responses:
        '201':
          description: Gerät registriert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceRegisterResponse'
        '400':
          description: Ungültige Eingabe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notifications/devices/{deviceId}:
    delete:
      summary: Gerät deregistrieren
      description: >
        Entfernt ein Gerät aus der Liste der Push-Empfänger.
      tags: [Notifications]
      security:
        - BearerAuth: []
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Geräte-ID
      responses:
        '204':
          description: Gerät deregistriert
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Reise nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /calendar:
    get:
      summary: Kalender-Events auflisten
      description: >
        Gibt alle Kalender-Events zurück, die der authentifizierte Nutzer
        sehen darf. Die Sichtbarkeit richtet sich nach dem `visibility`-Feld
        des Events (privat/öffentlich/enge Freunde) sowie der expliziten
        Teilnehmer-Liste. Unterstützt Paginierung und Zeitfilter.
      tags: [Calendar]
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: start
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: >
            UTC-Zeitstempel im Format `YYYY-MM-DD HH:MM:SS`. Events deren
            `endTime` nach diesem Zeitpunkt liegen werden zurückgegeben.
        - name: end
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: >
            UTC-Zeitstempel im Format `YYYY-MM-DD HH:MM:SS`. Events deren
            `startTime` vor diesem Zeitpunkt liegen werden zurückgegeben.
        - name: range
          in: query
          required: false
          schema:
            type: string
            enum: [week, month]
          description: >
            Vordefinierter Zeitbereich (aktuelle Woche / aktueller Monat).
            Wird ignoriert, wenn `start` und `end` gesetzt sind.
      responses:
        '200':
          description: Paginierte Liste der Kalender-Events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarEventListResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Kalender-Event erstellen
      description: >
        Erstellt ein neues Kalender-Event. Der authentifizierte Nutzer wird
        als Ersteller eingetragen. Optionale Teilnehmer-Liste wird direkt
        verknüpft. Teilnehmer erhalten eine Push-Benachrichtigung.
      tags: [Calendar]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalendarEventCreateRequest'
      responses:
        '201':
          description: Kalender-Event erstellt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarEventDetailResponse'
        '400':
          description: Ungültige Eingabedaten
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /calendar/{id}:
    get:
      summary: Kalender-Event abrufen
      description: >
        Gibt die Details eines Kalender-Events zurück. Der Nutzer muss
        das Event sehen dürfen (Ersteller, Teilnehmer, oder gemäss
        Sichtbarkeitseinstellung), sonst 404.
      tags: [Calendar]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Kalender-Event mit Teilnehmern
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarEventDetailResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Reise nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /app/version:
    get:
      summary: Aktuelle App-Version abfragen
      description: >
        Gibt die aktuell auf dem Server verfügbare App-Version zurück.
        Wird von der Android-App beim Start aufgerufen, um zu prüfen,
        ob ein Update verfügbar ist. Dieser Endpoint ist öffentlich
        zugänglich und erfordert keine Authentifizierung.
      tags: [App]
      operationId: getAppVersion
      responses:
        '200':
          description: Versionsinformationen erfolgreich abgerufen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppVersionResponse'
        '503':
          description: Versionsinformationen nicht verfügbar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Kalender-Event ändern
      description: >
        Ändert ein bestehendes Kalender-Event. Nur der Ersteller (oder
        Admin) darf ändern. Alle Teilnehmer erhalten eine
        Push-Benachrichtigung über die Änderung.
      tags: [Calendar]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalendarEventUpdateRequest'
      responses:
        '200':
          description: Aktualisiertes Kalender-Event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarEventDetailResponse'
        '400':
          description: Ungültige Eingabedaten
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Kein Ersteller dieses Events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Kalender-Event löschen
      description: >
        Löscht ein Kalender-Event. Nur der Ersteller (oder Admin) darf
        löschen. Es wird keine Benachrichtigung versendet.
      tags: [Calendar]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Event gelöscht (kein Inhalt)
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Kein Ersteller dieses Events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /calendar/{id}/participants:
    post:
      summary: Teilnehmer zu Kalender-Event hinzufügen
      description: >
        Fügt einen Nutzer als Teilnehmer zu einem Kalender-Event hinzu.
        Nur der Ersteller (oder Admin) darf Teilnehmer hinzufügen.
        Der hinzugefügte Nutzer erhält eine Push-Benachrichtigung.
      tags: [Calendar]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalendarEventAddParticipantRequest'
      responses:
        '201':
          description: Teilnehmer hinzugefügt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarEventAddParticipantResponse'
        '400':
          description: Ungültige Eingabedaten
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Kein Ersteller dieses Events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /calendar/{id}/participants/{userId}:
    delete:
      summary: Teilnehmer aus Kalender-Event entfernen
      description: >
        Entfernt einen Nutzer aus der Teilnehmer-Liste eines Kalender-Events.
        Nur der Ersteller (oder Admin) darf Teilnehmer entfernen.
      tags: [Calendar]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Teilnehmer entfernt (kein Inhalt)
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Kein Ersteller dieses Events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/login:
    get:
      summary: Admin-Login-Seite
      description: >
        Gibt die HTML-Login-Seite für den Admin-Bereich zurück.
      tags: [Admin]
      responses:
        '200':
          description: Login-HTML-Seite
          content:
            text/html: {}

  /admin/login/otp/request:
    post:
      summary: Admin-OTP anfordern
      description: >
        Fordert einen OTP-Login-Code für den Admin-Bereich an.
        Der Nutzer muss ein Administrator sein.
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpRequest'
      responses:
        '200':
          description: OTP gesendet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpSentResponse'
        '400':
          description: Ungültige E-Mail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Kein Admin-Zugriff
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Nutzer nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Zu viele Anfragen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/login/otp/verify:
    post:
      summary: Admin-OTP verifizieren
      description: >
        Verifiziert den OTP-Code und startet eine PHP-Session für den Admin-Bereich.
        Der Nutzer muss ein Administrator sein.
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyRequest'
      responses:
        '200':
          description: Session gestartet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLoginResponse'
        '400':
          description: Ungültiger oder abgelaufener Code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Kein Admin-Zugriff
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Nutzer nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/logout:
    get:
      summary: Admin-Abmeldung
      description: >
        Beendet die PHP-Session und leitet zur Login-Seite weiter.
      tags: [Admin]
      responses:
        '302':
          description: Redirect zur Login-Seite

  /admin:
    get:
      summary: Admin-Dashboard
      description: >
        Gibt die HTML-Dashboard-Seite des Admin-Bereichs zurück.
        Erreichbar auch unter `/admin/` (mit `/`).
      tags: [Admin]
      responses:
        '200':
          description: Dashboard-HTML-Seite
          content:
            text/html: {}
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Kein Admin-Zugriff
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/:
    get:
      $ref: '#/paths/~1admin/get'

  /admin/users:
    get:
      summary: Admin-Nutzerverwaltung
      description: >
        Gibt die HTML-Nutzerverwaltungs-Seite zurück (Platzhalter).
      tags: [Admin]
      responses:
        '200':
          description: Nutzerverwaltungs-HTML-Seite
          content:
            text/html: {}
        '401':
          description: Nicht autorisiert
