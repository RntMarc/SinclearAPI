openapi: 3.1.0
info:
  title: Sinclear Beyond API
  version: 2.0.0
  description: Zentrale REST-API für Sinclear Beyond

servers:
  - url: /api/v2
    description: API v2

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access-Token (JWT), gültig 15 Minuten

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Fehlercode
        message:
          type: string
          description: Fehlerdetails (nur im Debug-Modus)

    PaginationMeta:
      type: object
      required: [page, limit, total, totalPages]
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 42
        totalPages:
          type: integer
          example: 3

    OtpRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: user@example.com

    OtpVerifyRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: E-Mail (optional bei Discord-Pairing-Codes)
          example: user@example.com
        code:
          type: string
          pattern: '^\d{6}$'
          description: 6-stelliger Code aus E-Mail oder Discord-Callback
          example: '482731'

    DiscordStartResponse:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: Discord OAuth2 Authorize-URL mit PKCE
          example: https://discord.com/api/oauth2/authorize?response_type=code&client_id=...

    OtpSentResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          enum: [otp_sent]
          description: Bestätigung des OTP-Versands

    TokenResponse:
      type: object
      required: [access_token, expires_in, refresh_token, token_type]
      properties:
        access_token:
          type: string
          description: JWT Access-Token
        expires_in:
          type: integer
          description: Gültigkeitsdauer in Sekunden
          example: 900
        refresh_token:
          type: string
          description: Refresh-Token für Token-Erneuerung
        token_type:
          type: string
          enum: [Bearer]

    AdminLoginResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: login_success

    AdminUser:
      type: object
      required: [id, email, displayName, isAdmin]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        isAdmin:
          type: boolean

    AdminSendNotificationRequest:
      type: object
      required: [userId, code, deepLink]
      properties:
        userId:
          type: string
          format: uuid
          description: Empfänger der Benachrichtigung
        code:
          type: string
          description: >
            Benachrichtigungscode. Unterstützte Werte:
            `admin.system_update`, `admin.new_feature`,
            `admin.maintenance`, `admin.welcome`, `admin.test`,
            `admin.custom`
          example: admin.system_update
        deepLink:
          type: string
          description: >
            Zielseite in der App. Unterstützte Werte:
            `home`, `travel`, `events`, `profile`, `settings`,
            `friends`, `discover`, `news`, `chat`, `feedback`
          example: home
        title:
          type: string
          description: Nur bei `admin.custom`: Titel der Benachrichtigung
        body:
          type: string
          description: Nur bei `admin.custom`: Nachrichtentext

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: Refresh-Token aus vorherigem Login

    RefreshTokenResponse:
      type: object
      required: [refresh_token, expires_at]
      properties:
        refresh_token:
          type: string
          description: Refresh-Token
        expires_at:
          type: integer
          description: Unix-Timestamp, wann der Refresh-Token abläuft

    ExplorePlace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Restaurant Beispiel
        description:
          type: string
          nullable: true
        category:
          type: string
          enum: [gastronomy, leisure]
        address:
          type: string
          nullable: true
        latitude:
          type: number
          format: float
          nullable: true
        longitude:
          type: number
          format: float
          nullable: true
        osmId:
          type: integer
          nullable: true
        osmType:
          type: string
          enum: [N, W, R]
          nullable: true
        phone:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        openingHours:
          type: string
          nullable: true
        cuisine:
          type: string
          nullable: true
          description: Nur bei Gastronomie
        creatorId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
          description: Erstellungszeitpunkt (UTC)
        lastUpdated:
          type: string
          format: date-time
          description: Letzte Aktualisierung (UTC)
        distance:
          type: number
          format: float
          nullable: true
          description: Entfernung in Metern (nur bei Umkreissuche)
        avgRating:
          type: number
          format: float
          nullable: true
          description: Durchschnittsbewertung aller Nutzerreviews (null bei keinen Bewertungen)
        bookmarkedAt:
          type: string
          format: date-time
          nullable: true
          description: Zeitpunkt des Bookmarks (UTC, nur bei Bookmark-Liste)
        _attribution:
          type: string
          description: Quellennachweis für OpenStreetMap-Daten (immer vorhanden)
          example: "© OpenStreetMap contributors"

    BookmarkStatusResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [bookmarked]
          properties:
            bookmarked:
              type: boolean

    BookmarkActionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, bookmarked]
          properties:
            id:
              type: string
              format: uuid
            bookmarked:
              type: boolean

    ExploreCreateRequest:
      type: object
      required: [osmId, osmType]
      properties:
        osmId:
          type: integer
          description: OpenStreetMap-ID des Ortes
          example: 123456789
        osmType:
          type: string
          enum: [N, W, R]
          description: OSM-Objekttyp (Node, Way, Relation)
          example: N

    ExploreListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ExplorePlace'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    ExploreDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/ExplorePlace'

    ReviewResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, placeId, userId, rating, createdAt]
          properties:
            id:
              type: string
              format: uuid
            placeId:
              type: string
              format: uuid
            userId:
              type: string
              format: uuid
            rating:
              type: integer
              minimum: 1
              maximum: 5
              description: Bewertung von 1 bis 5
            comment:
              type: string
              nullable: true
            createdAt:
              type: string
              format: date-time
              description: Erstellungszeitpunkt (UTC)

    ReviewListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ReviewResponse/properties/data'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    CreateReviewRequest:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Bewertung von 1 bis 5
        comment:
          type: string
          description: Optionaler Kommentar zur Bewertung

    UpdateReviewRequest:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Bewertung von 1 bis 5
        comment:
          type: string
          nullable: true
          description: Kommentar (null löscht vorhandenen Kommentar)

    TravelTrip:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Sommerurlaub 2025
        description:
          type: string
          nullable: true
        start:
          type: string
          format: date-time
          description: Reisebeginn (UTC)
        end:
          type: string
          format: date-time
          description: Reiseende (UTC)
        hastickets:
          type: string
          enum: ['0', '1']
        ticket:
          type: string
          nullable: true
        ticketUrl:
          type: string
          format: uri
          nullable: true

    TravelTripListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TravelTrip'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    TravelTripDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/TravelTrip'

    TravelEvent:
      type: object
      properties:
        ID:
          type: string
          format: uuid
        trip:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          example: Konzert Berlin
        description:
          type: string
          nullable: true
        start:
          type: string
          format: date-time
          description: Event-Beginn (UTC)
        end:
          type: string
          format: date-time
          description: Event-Ende (UTC)
        hastickets:
          type: string
          enum: ['0', '1']
        ticket:
          type: string
          nullable: true
        ticketUrl:
          type: string
          format: uri
          nullable: true
        url:
          type: string
          format: uri
          nullable: true
        image:
          type: string
          nullable: true
        organizer:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        latitude:
          type: number
          format: float
          nullable: true
        longitude:
          type: number
          format: float
          nullable: true
        OSMID:
          type: integer
          nullable: true
        participants:
          type: array
          description: Teilnehmer des Events (über EventRelation)
          items:
            $ref: '#/components/schemas/TravelParticipantBrief'

    TravelParticipantBrief:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        image:
          type: string
          nullable: true

    TravelEventListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TravelEvent'

    TravelEventDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/TravelEvent'

    TravelStandaloneEventListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TravelEvent'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    TravelAccommodation:
      type: object
      properties:
        ID:
          type: string
          format: uuid
        name:
          type: string
          example: Hotel Sonnenschein
        description:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        OSMID:
          type: integer
          nullable: true
        latitude:
          type: number
          format: float
          nullable: true
        longitude:
          type: number
          format: float
          nullable: true
        phone:
          type: string
          nullable: true
        mail:
          type: string
          format: email
          nullable: true
        ishotel:
          type: integer
          description: '1 = Hotel, 0 = andere Unterkunft'
        users:
          type: array
          description: Nutzer, die dieser Unterkunft zugeordnet sind (über TravelRelation)
          items:
            $ref: '#/components/schemas/TravelParticipantBrief'

    TravelAccommodationListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TravelAccommodation'

    TravelAccommodationDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/TravelAccommodation'

    TravelParticipant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        image:
          type: string
          nullable: true

    TravelParticipantListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TravelParticipant'

    UserBrief:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        image:
          type: string
          nullable: true

    CalendarEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        creatorId:
          type: string
          format: uuid
          description: Ersteller des Kalender-Events
        title:
          type: string
          example: Team Meeting
        description:
          type: string
          nullable: true
        startTime:
          type: string
          format: date-time
          description: Startzeit (UTC)
        endTime:
          type: string
          format: date-time
          description: Endzeit (UTC)
        visibility:
          type: integer
          enum: [0, 1, 2]
          description: '0 = privat, 1 = öffentlich, 2 = enge Freunde'
        participants:
          type: array
          description: Teilnehmer des Kalender-Events
          items:
            $ref: '#/components/schemas/UserBrief'
        createdAt:
          type: string
          format: date-time
          description: Erstellungszeitpunkt (UTC)
        updatedAt:
          type: string
          format: date-time
          description: Änderungszeitpunkt (UTC)

    CalendarEventListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CalendarEvent'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    CalendarEventDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/CalendarEvent'

    CalendarEventCreateRequest:
      type: object
      required: [title, startTime, endTime]
      properties:
        title:
          type: string
          example: Team Meeting
        description:
          type: string
          nullable: true
        startTime:
          type: string
          format: date-time
          description: Startzeit (UTC)
          example: '2026-07-01T10:00:00Z'
        endTime:
          type: string
          format: date-time
          description: Endzeit (UTC)
          example: '2026-07-01T11:00:00Z'
        visibility:
          type: integer
          enum: [0, 1, 2]
          default: 0
        participants:
          type: array
          items:
            type: string
            format: uuid
          description: Optionale Liste von Nutzer-IDs, die als Teilnehmer hinzugefügt werden

    CalendarEventUpdateRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        startTime:
          type: string
          format: date-time
          description: Startzeit (UTC)
        endTime:
          type: string
          format: date-time
          description: Endzeit (UTC)
        visibility:
          type: integer
          enum: [0, 1, 2]

    CalendarEventAddParticipantRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
          format: uuid
          description: Nutzer-ID, die als Teilnehmer hinzugefügt wird

    CalendarEventAddParticipantResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          properties:
            calendarEventId:
              type: string
              format: uuid
            userId:
              type: string
              format: uuid

    UserBase:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        emailVisibility:
          type: integer
          enum: [0, 1, 2]
          description: Sichtbarkeit der E-Mail
        displayName:
          type: string
        image:
          type: string
          nullable: true
        discordId:
          type: string
          nullable: true
        isAdmin:
          type: boolean
        createdAt:
          type: string
          format: date-time
          description: Erstellungszeitpunkt (UTC)
        onboardingCompleted:
          type: boolean
        birthday:
          type: string
          format: date
          nullable: true
        birthdayVisibility:
          type: integer
          enum: [0, 1, 2]
          description: Sichtbarkeit des Geburtstags

    UserSocialInfo:
      type: object
      properties:
        unsplashHandle:
          type: string
          nullable: true
        unsplashVisibility:
          type: integer
          enum: [0, 1, 2]
        instagramHandle:
          type: string
          nullable: true
        instagramVisibility:
          type: integer
          enum: [0, 1, 2]
        mastodonUser:
          type: string
          nullable: true
        mastodonServer:
          type: string
          nullable: true
        mastodonVisibility:
          type: integer
          enum: [0, 1, 2]
        pixelfedUser:
          type: string
          nullable: true
        pixelfedServer:
          type: string
          nullable: true
        pixelfedVisibility:
          type: integer
          enum: [0, 1, 2]
        blueskyHandle:
          type: string
          nullable: true
        blueskyVisibility:
          type: integer
          enum: [0, 1, 2]
        youtubeHandle:
          type: string
          nullable: true
        youtubeVisibility:
          type: integer
          enum: [0, 1, 2]
        twitchHandle:
          type: string
          nullable: true
        twitchVisibility:
          type: integer
          enum: [0, 1, 2]

    UserContactInfo:
      type: object
      properties:
        discordHandle:
          type: string
          nullable: true
        discordVisibility:
          type: integer
          enum: [0, 1, 2]
        fluxerHandle:
          type: string
          nullable: true
        fluxerVisibility:
          type: integer
          enum: [0, 1, 2]
        signalNumber:
          type: string
          nullable: true
        signalVisibility:
          type: integer
          enum: [0, 1, 2]
        whatsappNumber:
          type: string
          nullable: true
        whatsappVisibility:
          type: integer
          enum: [0, 1, 2]
        matrixUser:
          type: string
          nullable: true
        matrixHomeserver:
          type: string
          nullable: true
        matrixVisibility:
          type: integer
          enum: [0, 1, 2]

    UserMe:
      type: object
      allOf:
        - $ref: '#/components/schemas/UserBase'
        - type: object
          properties:
            social:
              $ref: '#/components/schemas/UserSocialInfo'
            contact:
              $ref: '#/components/schemas/UserContactInfo'

    UserBasePublic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          description: Nur sichtbar wenn der Eigentümer die Sichtbarkeit erlaubt
        displayName:
          type: string
        image:
          type: string
          nullable: true
        discordId:
          type: string
          nullable: true
        isAdmin:
          type: boolean
        createdAt:
          type: string
          format: date-time
          description: Erstellungszeitpunkt (UTC)
        onboardingCompleted:
          type: boolean
        birthday:
          type: string
          format: date
          nullable: true
          description: Nur sichtbar wenn der Eigentümer die Sichtbarkeit erlaubt

    UserSocialInfoPublic:
      type: object
      properties:
        unsplashHandle:
          type: string
          nullable: true
        instagramHandle:
          type: string
          nullable: true
        mastodonUser:
          type: string
          nullable: true
        mastodonServer:
          type: string
          nullable: true
        pixelfedUser:
          type: string
          nullable: true
        pixelfedServer:
          type: string
          nullable: true
        blueskyHandle:
          type: string
          nullable: true
        youtubeHandle:
          type: string
          nullable: true
        twitchHandle:
          type: string
          nullable: true

    UserContactInfoPublic:
      type: object
      properties:
        discordHandle:
          type: string
          nullable: true
        fluxerHandle:
          type: string
          nullable: true
        signalNumber:
          type: string
          nullable: true
        whatsappNumber:
          type: string
          nullable: true
        matrixUser:
          type: string
          nullable: true
        matrixHomeserver:
          type: string
          nullable: true

    UserDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/UserMe'

    UserListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserBasePublic'

    UserDetailPublicResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          allOf:
            - $ref: '#/components/schemas/UserBasePublic'
            - type: object
              properties:
                social:
                  $ref: '#/components/schemas/UserSocialInfoPublic'
                contact:
                  $ref: '#/components/schemas/UserContactInfoPublic'

    ProfileUpdateRequest:
      type: object
      properties:
        image:
          type: string
          nullable: true
          description: >-
            Profilbild als Base64-codierter String. Erlaubte Formate: JPEG, PNG,
            WebP. Maximal 200 KB, max. Abmessungen 1000x1000 Pixel. Setze null
            um das Profilbild zu entfernen.
        displayName:
          type: string
          description: Anzeigename
        birthday:
          type: string
          format: date
          nullable: true
          description: Geburtstag (YYYY-MM-DD) oder null
        discordHandle:
          type: string
          nullable: true
        fluxerHandle:
          type: string
          nullable: true
        signalNumber:
          type: string
          nullable: true
        whatsappNumber:
          type: string
          nullable: true
        matrixUser:
          type: string
          nullable: true
        matrixHomeserver:
          type: string
          nullable: true
        unsplashHandle:
          type: string
          nullable: true
        instagramHandle:
          type: string
          nullable: true
        mastodonUser:
          type: string
          nullable: true
        mastodonServer:
          type: string
          nullable: true
        pixelfedUser:
          type: string
          nullable: true
        pixelfedServer:
          type: string
          nullable: true
        blueskyHandle:
          type: string
          nullable: true
        youtubeHandle:
          type: string
          nullable: true
        twitchHandle:
          type: string
          nullable: true

    VisibilityUpdateRequest:
      type: object
      properties:
        emailVisibility:
          type: integer
          enum: [0, 1, 2]
        birthdayVisibility:
          type: integer
          enum: [0, 1, 2]
        discordVisibility:
          type: integer
          enum: [0, 1, 2]
        fluxerVisibility:
          type: integer
          enum: [0, 1, 2]
        matrixVisibility:
          type: integer
          enum: [0, 1, 2]
        signalVisibility:
          type: integer
          enum: [0, 1, 2]
        whatsappVisibility:
          type: integer
          enum: [0, 1, 2]
        unsplashVisibility:
          type: integer
          enum: [0, 1, 2]
        instagramVisibility:
          type: integer
          enum: [0, 1, 2]
        mastodonVisibility:
          type: integer
          enum: [0, 1, 2]
        pixelfedVisibility:
          type: integer
          enum: [0, 1, 2]
        blueskyVisibility:
          type: integer
          enum: [0, 1, 2]
        youtubeVisibility:
          type: integer
          enum: [0, 1, 2]
        twitchVisibility:
          type: integer
          enum: [0, 1, 2]

    EmailChangeRequest:
      type: object
      required: [newEmail]
      properties:
        newEmail:
          type: string
          format: email
          description: Neue E-Mail-Adresse

    EmailChangeVerifyRequest:
      type: object
      required: [code, newEmail]
      properties:
        code:
          type: string
          pattern: '^\d{6}$'
          description: Per OTP erhaltener 6-stelliger Code
        newEmail:
          type: string
          format: email
          description: Neue E-Mail-Adresse (wie bei request)

    DiscordStartResponse:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: Discord-OAuth-URL zur Autorisierung

    DiscordVerifyRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          pattern: '^\d{6}$'
          description: Per Discord-Callback erhaltener 6-stelliger Code

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    Notification:
      type: object
      required: [id, code, payload, createdAt]
      properties:
        id:
          type: string
          format: uuid
          description: Eindeutige Benachrichtigungs-ID
        code:
          type: string
          description: >
            Interner Benachrichtigungscode im Format `domain.action`.
            Wird vom Client zur Anzeige verwendet. Vollständige Liste
            in der Dokumentation.
          example: changelog.new_feature
        payload:
          type: object
          description: >
            JSON-Objekt mit kontextabhängigen Informationen.
            Die Struktur variiert je nach `code`. Siehe Dokumentation
            für die genauen Schemata pro Code.
          example: { "deepLink": "home" }
        createdAt:
          type: string
          format: date-time
          description: Erstellungszeitpunkt (ISO 8601, UTC)

    NotificationListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        meta:
          type: object
          required: [unreadCount]
          properties:
            unreadCount:
              type: integer
              description: Anzahl ungelesener Benachrichtigungen

    NotificationDeleteResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [deleted]
          properties:
            deleted:
              type: integer
              description: Anzahl gelöschter Benachrichtigungen

    DeviceRegisterRequest:
      type: object
      required: [token, platform]
      properties:
        token:
          type: string
          description: FCM Registration Token
        platform:
          type: string
          enum: [android, web, ios, linux, windows]
          description: Plattform des Geräts
        deviceName:
          type: string
          description: Optionale Bezeichnung des Geräts
          example: Mein Android Handy

    DeviceRegisterResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, platform, pushEnabled]
          properties:
            id:
              type: string
              format: uuid
              description: Geräte-ID
            platform:
              type: string
              description: Plattform des Geräts
            pushEnabled:
              type: boolean
              description: Push-Benachrichtigungen aktiviert

    Device:
      type: object
      required: [id, platform, pushEnabled, lastActiveAt, createdAt]
      properties:
        id:
          type: string
          format: uuid
          description: Geräte-ID
        deviceName:
          type: string
          description: Optionale Bezeichnung des Geräts
        platform:
          type: string
          description: Plattform des Geräts
        pushEnabled:
          type: boolean
          description: Push-Benachrichtigungen aktiviert
        lastActiveAt:
          type: string
          format: date-time
          description: Letzte Aktivität (UTC)
        createdAt:
          type: string
          format: date-time
          description: Registrierungszeitpunkt (UTC)

    DeviceListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Device'

paths:
  /auth/login/otp/request:
    post:
      summary: E-Mail-OTP anfordern
      description: >
        Sendet einen 6-stelligen Code per E-Mail an den Nutzer.
        Der Nutzer muss in der Datenbank existieren. Pro E-Mail
        sind maximal 3 Anfragen pro 60 Sekunden erlaubt.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpRequest'
      responses:
        '200':
          description: OTP-Code wurde versendet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpSentResponse'
        '400':
          description: Ungültige E-Mail-Adresse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Ort nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login/otp/verify:
    post:
      summary: OTP-Code oder Discord-Pairing-Code verifizieren
      description: >
        Prüft den 6-stelligen Code gegen die Datenbank.
        Bei erfolgreicher Prüfung wird ein Refresh-Token ausgestellt.
        Der Code darf nicht älter als 10 Minuten (E-Mail-OTP) bzw.
        2 Minuten (Discord-Pairing) sein und kann nur einmal verwendet werden.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyRequest'
      responses:
        '200':
          description: Code gültig – Refresh-Token wird ausgestellt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '400':
          description: Ungültiger oder abgelaufener Code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Nutzer nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Zu viele Versuche
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login/discord/start:
    post:
      summary: Discord OAuth2-Login starten
      description: >
        Erzeugt eine Discord OAuth2 Authorize-URL mit PKCE.
        Der Client öffnet diese URL in einem Browser.
      tags: [Authentication]
      responses:
        '200':
          description: Discord-URL wurde erzeugt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscordStartResponse'

  /auth/login/discord/callback:
    get:
      summary: Discord OAuth2-Callback
      description: >
        Wird von Discord nach erfolgreicher Autorisierung aufgerufen.
        Die API tauscht den Authorization-Code gegen Discord-Tokens,
        prüft die Guild-Mitgliedschaft, sucht den Nutzer in der DB
        und zeigt einen 6-stelligen Pairing-Code an.
        Der Nutzer kopiert diesen Code in die App und verwendet ihn
        am Endpunkt `/auth/login/otp/verify`.
      tags: [Authentication]
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization-Code von Discord
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: State-Parameter (PKCE, Anti-CSRF)
      responses:
        '200':
          description: HTML-Seite mit dem 6-stelligen Pairing-Code
          content:
            text/html:
              schema:
                type: string
                example: "<html>..."
        '400':
          description: Ungültiger oder abgelaufener State / Code

  /auth/register/discord/start:
    post:
      summary: Discord OAuth2-Registrierung starten
      description: >
        Erzeugt eine Discord OAuth2 Authorize-URL mit PKCE für die
        Registrierung eines neuen Kontos. Der Client öffnet diese URL
        in einem Browser. Der Discord-Account darf noch nicht mit einem
        bestehenden Konto verknüpft sein.
      tags: [Authentication]
      responses:
        '200':
          description: Discord-URL wurde erzeugt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscordStartResponse'

  /auth/register/discord/callback:
    get:
      summary: Discord OAuth2-Registrierungs-Callback
      description: >
        Wird von Discord nach erfolgreicher Autorisierung aufgerufen.
        Die API tauscht den Authorization-Code gegen Discord-Tokens,
        prüft die Guild-Mitgliedschaft, erstellt einen neuen Nutzer
        in der DB und zeigt einen 6-stelligen Pairing-Code an.
        Der Nutzer kopiert diesen Code in die App und verwendet ihn
        am Endpunkt `/auth/login/otp/verify`.
      tags: [Authentication]
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization-Code von Discord
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: State-Parameter (PKCE, Anti-CSRF)
      responses:
        '200':
          description: HTML-Seite mit dem 6-stelligen Pairing-Code
          content:
            text/html:
              schema:
                type: string
                example: "<html>..."
        '400':
          description: >
            Ungültiger State, Discord-Account bereits verknüpft,
            E-Mail bereits registriert oder Guild-Mitgliedschaft fehlt

  /auth/refresh:
    post:
      summary: Access-Token erneuern
      description: >
        Tauscht einen gültigen Refresh-Token gegen einen neuen
        Access-Token (JWT) und einen neuen Refresh-Token
        (Token-Rotation). Bei Wiederverwendung eines bereits
        rotierten Tokens wird die gesamte Token-Familie widerrufen.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Neue Tokens wurden ausgestellt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Fehlender Refresh-Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Ungültiger oder abgelaufener Refresh-Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Nutzer nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Zu viele Versuche
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user:
    get:
      summary: Alle Benutzer des Projekts auflisten
      description: >
        Gibt eine Liste aller Benutzer des Projekts zurück.
        Die Sichtbarkeit von E-Mail und Geburtstag wird
        pro Benutzer anhand der Einstellungen des anfragenden Nutzers gefiltert.
      tags: [User]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Liste aller Benutzer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/me:
    get:
      summary: Eigene Profildaten abrufen (vollständig)
      description: >
        Gibt die vollständigen Profildaten des angemeldeten Nutzers zurück,
        inklusive Kontakt- und Social-Informationen mit Sichtbarkeitseinstellungen.
      tags: [User]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Vollständige Profildaten
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Nutzer nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/me/base:
    get:
      summary: Eigene Basis-Profildaten abrufen
      description: >
        Gibt nur die Basis-Profildaten (User-Tabelle) des angemeldeten Nutzers zurück,
        inklusive Sichtbarkeitseinstellungen.
      tags: [User]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Basis-Profildaten
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/UserBase'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/me/social:
    get:
      summary: Eigene Social-Informationen abrufen
      description: >
        Gibt die Social-Media-Handles des angemeldeten Nutzers zurück,
        inklusive Sichtbarkeitseinstellungen.
      tags: [User]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Social-Informationen
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/UserSocialInfo'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/me/contact:
    get:
      summary: Eigene Kontakt-Informationen abrufen
      description: >
        Gibt die Kontaktmöglichkeiten des angemeldeten Nutzers zurück,
        inklusive Sichtbarkeitseinstellungen.
      tags: [User]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Kontakt-Informationen
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/UserContactInfo'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/{userId}:
    get:
      summary: Benutzerprofil abrufen (öffentlich)
      description: >
        Gibt die Profildaten eines anderen Nutzers zurück.
        Nicht sichtbare Felder werden weggelassen.
        Die Sichtbarkeit richtet sich nach den Einstellungen des angefragten Nutzers
        und der engen-Freunde-Beziehung.
      tags: [User]
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID des angefragten Nutzers
      responses:
        '200':
          description: Öffentliche Profildaten
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailPublicResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Nutzer nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/{userId}/base:
    get:
      summary: Basis-Profildaten eines Nutzers abrufen
      description: >
        Gibt die Basis-Profildaten eines anderen Nutzers zurück.
        E-Mail und Geburtstag werden nur angezeigt, wenn die Sichtbarkeit dies erlaubt.
      tags: [User]
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Öffentliche Basis-Profildaten
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/UserBasePublic'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Nutzer nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/{userId}/social:
    get:
      summary: Social-Informationen eines Nutzers abrufen
      description: >
        Gibt die Social-Media-Handles eines anderen Nutzers zurück.
        Es werden nur die Handles angezeigt, deren Sichtbarkeitseinstellung dies erlaubt.
      tags: [User]
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Öffentliche Social-Informationen
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/UserSocialInfoPublic'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Nutzer nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/{userId}/contact:
    get:
      summary: Kontakt-Informationen eines Nutzers abrufen
      description: >
        Gibt die Kontaktmöglichkeiten eines anderen Nutzers zurück.
        Es werden nur die Felder angezeigt, deren Sichtbarkeitseinstellung dies erlaubt.
      tags: [User]
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Öffentliche Kontakt-Informationen
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/UserContactInfoPublic'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Nutzer nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/me/profile:
    put:
      summary: Eigenes Profil aktualisieren
      description: >
        Aktualisiert beliebig viele Felder des eigenen Profils gleichzeitig.
        Es werden nur die im Request Body gesendeten Felder aktualisiert.
        Jedes Feld wird individuell validiert.
      tags: [User]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        '200':
          description: Aktualisierte Profildaten
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailResponse'
        '400':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/me/email/request:
    post:
      summary: E-Mail-Änderung anfordern
      description: >
        Sendet einen 6-stelligen OTP-Code an die neue E-Mail-Adresse.
        Die neue Adresse darf noch nicht in der Datenbank existieren.
      tags: [User]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailChangeRequest'
      responses:
        '200':
          description: OTP wurde an die neue Adresse gesendet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Ungültige oder bereits vergebene E-Mail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Zu viele Anfragen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/me/email/verify:
    post:
      summary: E-Mail-Änderung bestätigen
      description: >
        Bestätigt die E-Mail-Änderung mit dem per OTP erhaltenen Code.
        Die E-Mail wird in der Datenbank aktualisiert und alle
        bestehenden Refresh-Tokens werden ungültig gemacht.
      tags: [User]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailChangeVerifyRequest'
      responses:
        '200':
          description: E-Mail wurde aktualisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Ungültiger oder abgelaufener Code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/me/discord/start:
    post:
      summary: Discord-Relink starten
      description: >
        Startet den OAuth2-Fluss zum Verknüpfen eines neuen Discord-Accounts.
        Gibt eine Discord-Autorisierungs-URL zurück.
      tags: [User]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Discord-OAuth-URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscordStartResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/me/discord/callback:
    get:
      summary: Discord-Relink-Callback
      description: >
        Wird von Discord nach erfolgreicher Autorisierung aufgerufen.
        Zeigt einen 6-stelligen Pairing-Code an, der in der App eingegeben
        werden muss. Dieser Endpunkt ist als Browser-Redirect-URL konfiguriert.
      tags: [User]
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Von Discord ausgestellter Autorisierungscode
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: State-Parameter (UUID) zur CSRF-Absicherung
      responses:
        '200':
          description: HTML-Seite mit Pairing-Code
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Fehler bei der Autorisierung
          content:
            text/html:
              schema:
                type: string

  /user/me/discord/verify:
    post:
      summary: Discord-Relink bestätigen
      description: >
        Bestätigt die Discord-Verknüpfung mit dem per Callback erhaltenen
        6-stelligen Pairing-Code. Die Discord-ID wird in der Datenbank
        aktualisiert.
      tags: [User]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscordVerifyRequest'
      responses:
        '200':
          description: Discord-Account wurde aktualisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Ungültiger oder abgelaufener Code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/me/visibility:
    put:
      summary: Sichtbarkeitseinstellungen aktualisieren
      description: >
        Aktualisiert die Sichtbarkeitseinstellungen für beliebig viele
        Profilfelder gleichzeitig. Erlaubte Werte: 0 (nur ich), 1 (alle),
        2 (nur enge Freunde).
      tags: [User]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VisibilityUpdateRequest'
      responses:
        '200':
          description: Sichtbarkeitseinstellungen aktualisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Ungültiges Feld oder ungültiger Visibility-Wert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /explore:
    get:
      summary: Orte auflisten
      description: >
        Gibt eine paginierte Liste aller Entdecken-Orte zurück.
        Optional filterbar nach Kategorie.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [gastronomy, leisure]
          description: Filter nach Kategorie
        - name: cuisine
          in: query
          required: false
          schema:
            type: string
          description: Filter nach Küchen-Typ (nur bei Gastronomie)
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [name_asc, name_desc, created_asc, created_desc, rating_asc, rating_desc]
          description: Sortierung der Ergebnisse
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginierte Liste der Orte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreListResponse'
        '400':
          description: Ungültige Kategorie oder Sortierung
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert (fehlender oder ungültiger Token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Neuen Ort anlegen
      description: >
        Legt einen neuen Entdecken-Ort an. Der Client übergibt die
        OSM-ID und den OSM-Typ. Die API ruft die Detaildaten
        von Nominatim/OpenStreetMap ab, bestimmt die Kategorie
        automatisch und speichert den Ort.
      tags: [Explore]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExploreCreateRequest'
      responses:
        '201':
          description: Ort wurde angelegt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreDetailResponse'
        '400':
          description: Ungültige OSM-ID oder OSM-Typ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Ort existiert bereits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /explore/search:
    get:
      summary: Orte durchsuchen
      description: >
        Durchsucht die Entdecken-Orte nach Namen, Kategorie, Küche
        oder geografischer Lage. Die Umkreissuche verwendet die
        Haversine-Formel. Alternativ kann ein Ortsname (`location`)
        übergeben werden, der automatisch über Nominatim geocoded wird.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Volltextsuche im Namen
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [gastronomy, leisure]
        - name: cuisine
          in: query
          required: false
          schema:
            type: string
          description: Küchen-Typ (nur bei Gastronomie)
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [name_asc, name_desc, created_asc, created_desc, rating_asc, rating_desc]
          description: Sortierung der Ergebnisse. Bei Umkreissuche primär nach Distanz, sekundär nach diesem Sortierkriterium.
        - name: city
          in: query
          required: false
          schema:
            type: string
          description: Filtert nach Stadt (LIKE-Suche in der address-Spalte)
        - name: lat
          in: query
          required: false
          schema:
            type: number
            format: float
          description: Breitengrad für Umkreissuche
        - name: lon
          in: query
          required: false
          schema:
            type: number
            format: float
          description: Längengrad für Umkreissuche
        - name: location
          in: query
          required: false
          schema:
            type: string
          description: Ortsname (wird automatisch geocoded)
        - name: radius
          in: query
          required: false
          schema:
            type: integer
            default: 5000
            minimum: 1
            maximum: 50000
          description: Radius in Metern
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Suchergebnisse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreListResponse'
        '400':
          description: Ungültige Parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /explore/random:
    get:
      summary: Zufällige Orte abrufen
      description: >
        Gibt eine Liste zufälliger Entdecken-Orte zurück.
        Optional filterbar nach Kategorie.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [gastronomy, leisure]
          description: Filter nach Kategorie
      responses:
        '200':
          description: Liste zufälliger Orte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreListResponse'
        '400':
          description: Ungültige Kategorie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /explore/bookmarks:
    get:
      summary: Eigene Lesezeichen abrufen
      description: >
        Gibt eine paginierte Liste aller Orte zurück,
        die der angemeldete Nutzer als Lesezeichen gespeichert hat.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginierte Liste der Lesezeichen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreListResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /explore/{id}/bookmark:
    get:
      summary: Lesezeichen-Status abrufen
      description: >
        Prüft, ob der angemeldete Nutzer einen Ort
        als Lesezeichen gespeichert hat.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lesezeichen-Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookmarkStatusResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Lesezeichen setzen
      description: >
        Speichert einen Ort als Lesezeichen für den
        angemeldeten Nutzer.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Lesezeichen wurde gesetzt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookmarkActionResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Ort nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Lesezeichen existiert bereits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Lesezeichen entfernen
      description: >
        Entfernt ein Lesezeichen für den angemeldeten Nutzer.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Lesezeichen wurde entfernt
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /explore/{id}:
    get:
      summary: Ortsdetails abrufen
      description: >
        Gibt die Detaildaten eines einzelnen Entdecken-Ortes zurück.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID des Ortes
      responses:
        '200':
          description: Detaildaten des Ortes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreDetailResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Ort nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: OSM-Daten aktualisieren
      description: >
        Ruft die aktuellen OSM-Daten für einen Ort neu von
        Nominatim ab und überschreibt die gespeicherten Felder.
        Jeder authentifizierte Nutzer kann einen Refresh anstoßen.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ort wurde aktualisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreDetailResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Ort nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Ort löschen
      description: >
        Löscht einen Entdecken-Ort. Nur der Ersteller darf löschen,
        und auch nur dann, wenn noch keine Bewertungen (Reviews)
        zu diesem Ort existieren. Administratoren können immer löschen.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Ort wurde gelöscht
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Keine Berechtigung zum Löschen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Ort nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /explore/{placeId}/reviews:
    get:
      summary: Bewertungen eines Ortes abrufen
      description: >
        Gibt eine paginierte Liste aller Bewertungen zu einem
        Entdecken-Ort zurück. Authentifizierung erforderlich.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: placeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID des Ortes
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginierte Liste der Bewertungen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Ort nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Bewertung erstellen
      description: >
        Erstellt eine neue Bewertung für einen Entdecken-Ort.
        Der Nutzer kann mehrere Bewertungen pro Ort abgeben.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: placeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID des Ortes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Bewertung wurde erstellt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '400':
          description: Ungültige Bewertung (rating 1-5 erforderlich)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Ort nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /explore/{placeId}/reviews/{reviewId}:
    put:
      summary: Bewertung aktualisieren
      description: >
        Aktualisiert eine vorhandene Bewertung. Nur der
        Ersteller der Bewertung oder ein Admin darf diese ändern.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: placeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID des Ortes
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID der Bewertung
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReviewRequest'
      responses:
        '200':
          description: Bewertung wurde aktualisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '400':
          description: Ungültige Bewertung (rating 1-5 erforderlich)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Keine Berechtigung (nur der Ersteller darf ändern)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Reise nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notifications:
    get:
      summary: Benachrichtigungen abrufen
      description: >
        Gibt alle Benachrichtigungen des authentifizierten Nutzers zurück.
        Unterstützt Polling über den `since`-Parameter.
      tags: [Notifications]
      security:
        - BearerAuth: []
      parameters:
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: ISO 8601 Zeitstempel (UTC) - gibt nur Benachrichtigungen zurück, die danach erstellt wurden
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Maximale Anzahl an Benachrichtigungen
      responses:
        '200':
          description: Liste der Benachrichtigungen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Alle Benachrichtigungen als gelesen markieren
      description: >
        Löscht alle Benachrichtigungen des authentifizierten Nutzers.
      tags: [Notifications]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Anzahl gelöschter Benachrichtigungen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationDeleteResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notifications/{id}:
    get:
      summary: Einzelne Benachrichtigung abrufen
      description: >
        Gibt eine einzelne Benachrichtigung anhand ihrer ID zurück.
      tags: [Notifications]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Benachrichtigungs-ID
      responses:
        '200':
          description: Benachrichtigung
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Notification'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Benachrichtigung nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Benachrichtigung als gelesen markieren
      description: >
        Löscht eine einzelne Benachrichtigung (markiert als gelesen).
      tags: [Notifications]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Benachrichtigungs-ID
      responses:
        '204':
          description: Benachrichtigung gelöscht
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Benachrichtigung nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notifications/devices:
    get:
      summary: Registrierte Geräte auflisten
      description: >
        Gibt alle Geräte des authentifizierten Nutzers zurück,
        die für Push-Benachrichtigungen registriert sind.
      tags: [Notifications]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Liste der Geräte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceListResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Gerät für Push-Benachrichtigungen registrieren
      description: >
        Registriert ein Gerät für FCM-Push-Benachrichtigungen.
        Wenn das Gerät bereits existiert (gleicher Token), wird die letzte Aktivität aktualisiert.
      tags: [Notifications]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceRegisterRequest'
      responses:
        '201':
          description: Gerät registriert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceRegisterResponse'
        '400':
          description: Ungültige Eingabe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notifications/devices/{deviceId}:
    delete:
      summary: Gerät deregistrieren
      description: >
        Entfernt ein Gerät aus der Liste der Push-Empfänger.
      tags: [Notifications]
      security:
        - BearerAuth: []
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Geräte-ID
      responses:
        '204':
          description: Gerät deregistriert
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Reise nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /calendar:
    get:
      summary: Kalender-Events auflisten
      description: >
        Gibt alle Kalender-Events zurück, die der authentifizierte Nutzer
        sehen darf. Die Sichtbarkeit richtet sich nach dem `visibility`-Feld
        des Events (privat/öffentlich/enge Freunde) sowie der expliziten
        Teilnehmer-Liste. Unterstützt Paginierung und Zeitfilter.
      tags: [Calendar]
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: start
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: >
            Manueller Start der Zeitspanne (ISO 8601, UTC). Events deren
            `endTime` nach diesem Zeitpunkt liegen werden zurückgegeben.
        - name: end
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: >
            Manuelles Ende der Zeitspanne (ISO 8601, UTC). Events deren
            `startTime` vor diesem Zeitpunkt liegen werden zurückgegeben.
        - name: range
          in: query
          required: false
          schema:
            type: string
            enum: [week, month]
          description: >
            Vordefinierter Zeitbereich (aktuelle Woche / aktueller Monat).
            Wird ignoriert, wenn `start` und `end` gesetzt sind.
      responses:
        '200':
          description: Paginierte Liste der Kalender-Events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarEventListResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Kalender-Event erstellen
      description: >
        Erstellt ein neues Kalender-Event. Der authentifizierte Nutzer wird
        als Ersteller eingetragen. Optionale Teilnehmer-Liste wird direkt
        verknüpft. Teilnehmer erhalten eine Push-Benachrichtigung.
      tags: [Calendar]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalendarEventCreateRequest'
      responses:
        '201':
          description: Kalender-Event erstellt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarEventDetailResponse'
        '400':
          description: Ungültige Eingabedaten
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
