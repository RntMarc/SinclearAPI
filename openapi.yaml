          description: ID des Vorschlags
      responses:
        '204':
          description: Upvote erfolgreich entfernt
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Vorschlag nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

