openapi: 3.1.0
info:
  title: Sinclear Beyond API
  version: 2.0.0
  description: Zentrale REST-API für Sinclear Beyond

servers:
  - url: /api/v2
    description: API v2

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access-Token (JWT), gültig 15 Minuten

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Fehlercode
        message:
          type: string
          description: Fehlerdetails (nur im Debug-Modus)

    PaginationMeta:
      type: object
      required: [page, limit, total, totalPages]
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 42
        totalPages:
          type: integer
          example: 3

    OtpRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: user@example.com

    OtpVerifyRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: E-Mail (optional bei Discord-Pairing-Codes)
          example: user@example.com
        code:
          type: string
          pattern: '^\d{6}$'
          description: 6-stelliger Code aus E-Mail oder Discord-Callback
          example: '482731'

    DiscordStartResponse:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: Discord OAuth2 Authorize-URL mit PKCE
          example: https://discord.com/api/oauth2/authorize?response_type=code&client_id=...

    OtpSentResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          enum: [otp_sent]
          description: Bestätigung des OTP-Versands

    TokenResponse:
      type: object
      required: [access_token, expires_in, refresh_token, token_type]
      properties:
        access_token:
          type: string
          description: JWT Access-Token
        expires_in:
          type: integer
          description: Gültigkeitsdauer in Sekunden
          example: 900
        refresh_token:
          type: string
          description: Refresh-Token für Token-Erneuerung
        token_type:
          type: string
          enum: [Bearer]

    AdminLoginResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: login_success

    AdminUser:
      type: object
      required: [id, email, displayName, isAdmin]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        isAdmin:
          type: boolean

    AdminSendNotificationRequest:
      type: object
      required: [userId, code, deepLink]
      properties:
        userId:
          type: string
          format: uuid
          description: Empfänger der Benachrichtigung
        code:
          type: string
          description: >
            Benachrichtigungscode. Unterstützte Werte:
            `admin.system_update`, `admin.new_feature`,
            `admin.maintenance`, `admin.welcome`, `admin.test`,
            `admin.custom`
          example: admin.system_update
        deepLink:
          type: string
          description: >
            Zielseite in der App. Unterstützte Werte:
            `home`, `travel`, `events`, `profile`, `settings`,
            `friends`, `discover`, `news`, `chat`, `feedback`
          example: home
        title:
          type: string
          description: "Nur bei `admin.custom`: Titel der Benachrichtigung"
        body:
          type: string
          description: "Nur bei `admin.custom`: Nachrichtentext"

    AdminCreateTripRequest:
      type: object
      required: [name, start, end]
      properties:
        name:
          type: string
          maxLength: 255
          description: Name der Reise
          example: Sommerurlaub 2025
        description:
          type: string
          nullable: true
          description: Beschreibung der Reise
        start:
          type: string
          format: date-time
          description: Reisebeginn (UTC), Format `YYYY-MM-DD HH:MM:SS`
          example: "2025-07-01 10:00:00"
        end:
          type: string
          format: date-time
          description: Reiseende (UTC), Format `YYYY-MM-DD HH:MM:SS`
          example: "2025-07-15 18:00:00"
        hastickets:
          type: string
          enum: ['0', '1']
          default: '0'
        ticket:
          type: string
          nullable: true
        ticketUrl:
          type: string
          format: uri
          nullable: true

    AdminUpdateTripRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        hastickets:
          type: string
          enum: ['0', '1']
        ticket:
          type: string
          nullable: true
        ticketUrl:
          type: string
          format: uri
          nullable: true

    AdminTripResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/TravelTrip'

    AdminCreateEventRequest:
      type: object
      required: [name, start, end]
      properties:
        name:
          type: string
          maxLength: 255
          description: Name des Events
          example: Konzert Berlin
        description:
          type: string
          nullable: true
        trip:
          type: string
          format: uuid
          nullable: true
          description: >
            ID der zugehörigen Reise. Bei `null` oder leerem String
            wird ein Standalone-Event angelegt.
        start:
          type: string
          format: date-time
          description: Event-Beginn (UTC), Format `YYYY-MM-DD HH:MM:SS`
          example: "2025-07-10 14:00:00"
        end:
          type: string
          format: date-time
          description: Event-Ende (UTC), Format `YYYY-MM-DD HH:MM:SS`
          example: "2025-07-10 18:00:00"
        hastickets:
          type: string
          enum: ['0', '1']
          default: '0'
        ticket:
          type: string
          nullable: true
        ticketUrl:
          type: string
          format: uri
          nullable: true
        url:
          type: string
          format: uri
          nullable: true
        image:
          type: string
          format: uri
          nullable: true
        organizer:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        latitude:
          type: number
          format: float
          nullable: true
        longitude:
          type: number
          format: float
          nullable: true
        OSMID:
          type: integer
          nullable: true

    AdminUpdateEventRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        trip:
          type: string
          format: uuid
          nullable: true
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        hastickets:
          type: string
          enum: ['0', '1']
        ticket:
          type: string
          nullable: true
        ticketUrl:
          type: string
          format: uri
          nullable: true
        url:
          type: string
          format: uri
          nullable: true
        image:
          type: string
          format: uri
          nullable: true
        organizer:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        latitude:
          type: number
          format: float
          nullable: true
        longitude:
          type: number
          format: float
          nullable: true
        OSMID:
          type: integer
          nullable: true

    AdminEventResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/TravelEvent'

    AdminAddTripParticipantRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
          format: uuid
        accommodation:
          type: string
          format: uuid
          nullable: true

    AdminAddEventParticipantRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
          format: uuid

    AdminUpdateAccommodationRequest:
      type: object
      properties:
        accommodation:
          type: string
          format: uuid
          nullable: true
          description: ID der Unterkunft oder null zum Entfernen

    AdminParticipantResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          properties:
            id:
              type: string
              format: uuid

    AdminCreateAccommodationRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        mail:
          type: string
          format: email
          nullable: true
        latitude:
          type: number
          format: float
          nullable: true
        longitude:
          type: number
          format: float
          nullable: true
        OSMID:
          type: integer
          nullable: true
        ishotel:
          type: integer
          enum: [0, 1]
          default: 0

    AdminUpdateAccommodationRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        mail:
          type: string
          format: email
          nullable: true
        latitude:
          type: number
          format: float
          nullable: true
        longitude:
          type: number
          format: float
          nullable: true
        OSMID:
          type: integer
          nullable: true
        ishotel:
          type: integer
          enum: [0, 1]

    AdminAccommodationResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/TravelAccommodation'

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: Refresh-Token aus vorherigem Login

    RefreshTokenResponse:
      type: object
      required: [refresh_token, expires_at]
      properties:
        refresh_token:
          type: string
          description: Refresh-Token
        expires_at:
          type: integer
          description: Unix-Timestamp, wann der Refresh-Token abläuft

    ExplorePlace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Restaurant Beispiel
        description:
          type: string
          nullable: true
        category:
          type: string
          enum: [gastronomy, leisure]
        address:
          type: string
          nullable: true
        latitude:
          type: number
          format: float
          nullable: true
        longitude:
          type: number
          format: float
          nullable: true
        osmId:
          type: integer
          nullable: true
        osmType:
          type: string
          enum: [N, W, R]
          nullable: true
        phone:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        openingHours:
          type: string
          nullable: true
        cuisine:
          type: string
          nullable: true
          description: Nur bei Gastronomie
        creatorId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
          description: Erstellungszeitpunkt (UTC)
        lastUpdated:
          type: string
          format: date-time
          description: Letzte Aktualisierung (UTC)
        distance:
          type: number
          format: float
          nullable: true
          description: Entfernung in Metern (nur bei Umkreissuche)
        avgRating:
          type: number
          format: float
          nullable: true
          description: Durchschnittsbewertung aller Nutzerreviews (null bei keinen Bewertungen)
        bookmarkedAt:
          type: string
          format: date-time
          nullable: true
          description: Zeitpunkt des Bookmarks (UTC, nur bei Bookmark-Liste)
        _attribution:
          type: string
          description: Quellennachweis für OpenStreetMap-Daten (immer vorhanden)
          example: "© OpenStreetMap contributors"

    BookmarkStatusResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [bookmarked]
          properties:
            bookmarked:
              type: boolean

    BookmarkActionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, bookmarked]
          properties:
            id:
              type: string
              format: uuid
            bookmarked:
              type: boolean

    ExploreCreateRequest:
      type: object
      required: [osmId, osmType]
      properties:
        osmId:
          type: integer
          description: OpenStreetMap-ID des Ortes
          example: 123456789
        osmType:
          type: string
          enum: [N, W, R]
          description: OSM-Objekttyp (Node, Way, Relation)
          example: N

    ExploreListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ExplorePlace'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    ExploreDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/ExplorePlace'

    ReviewResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, placeId, userId, rating, createdAt]
          properties:
            id:
              type: string
              format: uuid
            placeId:
              type: string
              format: uuid
            userId:
              type: string
              format: uuid
            rating:
              type: integer
              minimum: 1
              maximum: 5
              description: Bewertung von 1 bis 5
            comment:
              type: string
              nullable: true
            createdAt:
              type: string
              format: date-time
              description: Erstellungszeitpunkt (UTC)

    ReviewListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ReviewResponse/properties/data'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    CreateReviewRequest:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Bewertung von 1 bis 5
        comment:
          type: string
          description: Optionaler Kommentar zur Bewertung

    UpdateReviewRequest:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Bewertung von 1 bis 5
        comment:
          type: string
          nullable: true
          description: Kommentar (null löscht vorhandenen Kommentar)

    TravelTrip:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Sommerurlaub 2025
        description:
          type: string
          nullable: true
        start:
          type: string
          format: date-time
          description: Reisebeginn (UTC), Format `YYYY-MM-DD HH:MM:SS`
        end:
          type: string
          format: date-time
          description: Reiseende (UTC), Format `YYYY-MM-DD HH:MM:SS`
        hastickets:
          type: string
          enum: ['0', '1']
        ticket:
          type: string
          nullable: true
        ticketUrl:
          type: string
          format: uri
          nullable: true

    TravelTripListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TravelTrip'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    TravelTripDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/TravelTrip'

    TravelEvent:
      type: object
      properties:
        ID:
          type: string
          format: uuid
        trip:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          example: Konzert Berlin
        description:
          type: string
          nullable: true
        start:
          type: string
          format: date-time
          description: Event-Beginn (UTC)
        end:
          type: string
          format: date-time
          description: Event-Ende (UTC)
        hastickets:
          type: string
          enum: ['0', '1']
        ticket:
          type: string
          nullable: true
        ticketUrl:
          type: string
          format: uri
          nullable: true
        url:
          type: string
          format: uri
          nullable: true
        image:
          type: string
          nullable: true
        organizer:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        latitude:
          type: number
          format: float
          nullable: true
        longitude:
          type: number
          format: float
          nullable: true
        OSMID:
          type: integer
          nullable: true
        participants:
          type: array
          description: Teilnehmer des Events (über EventRelation)
          items:
            $ref: '#/components/schemas/TravelParticipantBrief'

    TravelParticipantBrief:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        image:
          type: string
          nullable: true

    TravelEventListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TravelEvent'

    TravelEventDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/TravelEvent'

    TravelStandaloneEventListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TravelEvent'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    TravelAccommodation:
      type: object
      properties:
        ID:
          type: string
          format: uuid
        name:
          type: string
          example: Hotel Sonnenschein
        description:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        OSMID:
          type: integer
          nullable: true
        latitude:
          type: number
          format: float
          nullable: true
        longitude:
          type: number
          format: float
          nullable: true
        phone:
          type: string
          nullable: true
        mail:
          type: string
          format: email
          nullable: true
        ishotel:
          type: integer
          description: '1 = Hotel, 0 = andere Unterkunft'
        users:
          type: array
          description: Nutzer, die dieser Unterkunft zugeordnet sind (über TravelRelation)
          items:
            $ref: '#/components/schemas/TravelParticipantBrief'

    TravelAccommodationListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TravelAccommodation'

    TravelAccommodationDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/TravelAccommodation'

    TravelParticipant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        image:
          type: string
          nullable: true

    TravelParticipantListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TravelParticipant'

    UserBrief:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        image:
          type: string
          nullable: true

    CalendarEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        creatorId:
          type: string
          format: uuid
          description: Ersteller des Kalender-Events
        title:
          type: string
          example: Team Meeting
        description:
          type: string
          nullable: true
        startTime:
          type: string
          format: date-time
          description: Startzeit (UTC), Format `YYYY-MM-DD HH:MM:SS`
        endTime:
          type: string
          format: date-time
          description: Endzeit (UTC), Format `YYYY-MM-DD HH:MM:SS`
        visibility:
          type: integer
          enum: [0, 1, 2]
          description: '0 = privat, 1 = öffentlich, 2 = enge Freunde'
        participants:
          type: array
          description: Teilnehmer des Kalender-Events
          items:
            $ref: '#/components/schemas/UserBrief'
        createdAt:
          type: string
          format: date-time
          description: Erstellungszeitpunkt (UTC), Format `YYYY-MM-DD HH:MM:SS`
        updatedAt:
          type: string
          format: date-time
          description: Änderungszeitpunkt (UTC), Format `YYYY-MM-DD HH:MM:SS`

    CalendarEventListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CalendarEvent'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    CalendarEventDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/CalendarEvent'

    CalendarEventCreateRequest:
      type: object
      required: [title, startTime, endTime]
      properties:
        title:
          type: string
          example: Team Meeting
        description:
          type: string
          nullable: true
        startTime:
          type: string
          format: date-time
          description: Startzeit (UTC), Format `YYYY-MM-DD HH:MM:SS`
          example: '2026-07-01 10:00:00'
        endTime:
          type: string
          format: date-time
          description: Endzeit (UTC), Format `YYYY-MM-DD HH:MM:SS`
          example: '2026-07-01 11:00:00'
        visibility:
          type: integer
          enum: [0, 1, 2]
          default: 0
        participants:
          type: array
          items:
            type: string
            format: uuid
          description: Optionale Liste von Nutzer-IDs, die als Teilnehmer hinzugefügt werden

    CalendarEventUpdateRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        startTime:
          type: string
          format: date-time
          description: Startzeit (UTC)
        endTime:
          type: string
          format: date-time
          description: Endzeit (UTC)
        visibility:
          type: integer
          enum: [0, 1, 2]

    CalendarEventAddParticipantRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
          format: uuid
          description: Nutzer-ID, die als Teilnehmer hinzugefügt wird

    CalendarEventAddParticipantResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          properties:
            calendarEventId:
              type: string
              format: uuid
            userId:
              type: string
              format: uuid

    UserBase:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        emailVisibility:
          type: integer
          enum: [0, 1, 2]
          description: Sichtbarkeit der E-Mail
        displayName:
          type: string
        image:
          type: string
          nullable: true
        discordId:
          type: string
          nullable: true
        isAdmin:
          type: boolean
        createdAt:
          type: string
          format: date-time
          description: Erstellungszeitpunkt (UTC)
        onboardingCompleted:
          type: boolean
        birthday:
          type: string
          format: date
          nullable: true
        birthdayVisibility:
          type: integer
          enum: [0, 1, 2]
          description: Sichtbarkeit des Geburtstags

    UserSocialInfo:
      type: object
      properties:
        unsplashHandle:
          type: string
          nullable: true
        unsplashVisibility:
          type: integer
          enum: [0, 1, 2]
        instagramHandle:
          type: string
          nullable: true
        instagramVisibility:
          type: integer
          enum: [0, 1, 2]
        mastodonUser:
          type: string
          nullable: true
        mastodonServer:
          type: string
          nullable: true
