    LocationSharingSession:
      type: object
      required: [id, token, ownerId, sharingMode, frequencySeconds, isActive, startedAt, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        token:
          type: string
          pattern: '^[a-f0-9]{32}$'
          description: 32-Zeichen-hex Session-Token für Drittanbieter-Integration
        ownerId:
          type: string
          format: uuid
        sharingMode:
          type: string
          enum: [location, route]
          description: |
            Teilen-Modus:
            - `location` (Default): Nur aktueller Standort wird geteilt
            - `route`: Standort + Strecke (alle Standpunkte werden gespeichert)
        durationSeconds:
          type: integer
          nullable: true
          description: Dauer in Sekunden (300–86400). `null` = unbegrenzt (wird nach 7 Tagen ohne Standort gelöscht)
        frequencySeconds:
          type: integer
          description: Aktualisierungsfrequenz in Sekunden (300–1200, Default 600)
        isActive:
          type: boolean
        startedAt:
          type: string
          format: date-time
          description: UTC-Zeitstempel im Format `YYYY-MM-DD HH:MM:SS`
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: UTC-Zeitstempel im Format `YYYY-MM-DD HH:MM:SS`. `null` = unbegrenzt gültig
        createdAt:
          type: string
          format: date-time
          description: UTC-Zeitstempel im Format `YYYY-MM-DD HH:MM:SS`
        updatedAt:
          type: string
          format: date-time
          description: UTC-Zeitstempel im Format `YYYY-MM-DD HH:MM:SS`

    LocationSharingSessionDetail:
      allOf:
        - $ref: '#/components/schemas/LocationSharingSession'
        - type: object
          properties:
            recipients:
              type: array
              items:
                type: object
                properties:
                  userId:
                    type: string
                    format: uuid
                  displayName:
                    type: string
                  image:
                    type: string
                    nullable: true
                  createdAt:
                    type: string
                    format: date-time
            lastLocation:
              $ref: '#/components/schemas/LocationSharingLocation'
            locationCount:
              type: integer
              description: Anzahl der gespeicherten Standortpunkte
            integrationUrls:
              type: object
              description: URL-Vorlagen für Drittanbieter-Tracking-Clients
              properties:
                osmand:
                  type: string
                  format: uri
                gpslogger:
                  type: string
                  format: uri
                owntracks:
                  type: string
                  format: uri
                ulogger:
                  type: string
                  format: uri
                traccar:
                  type: string
                  format: uri
                opengts:
                  type: string
                  format: uri
                overland:
                  type: string
                  format: uri
                locusmap:
                  type: string
                  format: uri
                httpGet:
                  type: string
                  format: uri

    LocationSharingLocation:
      type: object
      required: [id, latitude, longitude, recordedAt, createdAt]
      properties:
        id:
          type: string
          format: uuid
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        accuracy:
          type: number
          format: double
          nullable: true
        recordedAt:
          type: string
          format: date-time
          description: UTC-Zeitstempel im Format `YYYY-MM-DD HH:MM:SS`
        createdAt:
          type: string
          format: date-time
          description: UTC-Zeitstempel im Format `YYYY-MM-DD HH:MM:SS`

    LocationSharingCreateRequest:
      type: object
      required: [recipient_ids]
      properties:
        recipient_ids:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
          maxItems: 50
          description: IDs der Empfänger
        duration_seconds:
          type: integer
          minimum: 300
          maximum: 86400
          description: Dauer in Sekunden (5 Min – 24 h). Optional – wenn nicht gesetzt, läuft die Session unbegrenzt (wird nach 7 Tagen ohne Standort gelöscht)
        frequency_seconds:
          type: integer
          minimum: 300
          maximum: 1200
          default: 600
          description: Aktualisierungsfrequenz in Sekunden (5–20 Min)
        sharing_mode:
          type: string
          enum: [location, route]
          default: location
          description: |
            Teilen-Modus:
            - `location` (Default): Nur aktueller Standort wird geteilt
            - `route`: Standort + Strecke (alle Standpunkte werden gespeichert)

    LocationSharingUpdateRequest:
      type: object
      properties:
        duration_seconds:
          type: integer
          minimum: 300
          maximum: 86400
          description: Neue Dauer in Sekunden
        is_active:
          type: boolean
          description: Session beenden (false) oder aktiv lassen (true)

    LocationSharingLocationCreateRequest:
      type: object
      required: [latitude, longitude, recordedAt]
      properties:
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
        accuracy:
          type: number
          format: double
          minimum: 0
          nullable: true
          description: GPS-Genauigkeit in Metern
        recordedAt:
          type: string
          format: date-time
          description: UTC-Zeitstempel im Format `YYYY-MM-DD HH:MM:SS`. Nicht in der Zukunft, max. 5 Minuten alt.

    LocationSharingSessionListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LocationSharingSession'

    LocationSharingSessionDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/LocationSharingSessionDetail'

    LocationSharingLocationListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LocationSharingLocation'

    LocationSharingActiveResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              session:
                $ref: '#/components/schemas/LocationSharingSession'
              owner:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  displayName:
                    type: string
                  image:
                    type: string
                    nullable: true
              lastLocation:
                $ref: '#/components/schemas/LocationSharingLocation'

paths:
  /auth/login/otp/request:
    post:
      summary: E-Mail-OTP anfordern
      description: >
        Sendet einen 6-stelligen Code per E-Mail an den Nutzer.
        Der Nutzer muss in der Datenbank existieren. Pro E-Mail
        sind maximal 3 Anfragen pro 60 Sekunden erlaubt.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpRequest'
      responses:
        '200':
          description: OTP-Code wurde versendet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpSentResponse'
        '400':
          description: Ungültige E-Mail-Adresse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Ort nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login/otp/verify:
    post:
      summary: OTP-Code oder Discord-Pairing-Code verifizieren
      description: >
        Prüft den 6-stelligen Code gegen die Datenbank.
        Bei erfolgreicher Prüfung wird ein Refresh-Token ausgestellt.
        Der Code darf nicht älter als 10 Minuten (E-Mail-OTP) bzw.
        2 Minuten (Discord-Pairing) sein und kann nur einmal verwendet werden.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyRequest'
      responses:
        '200':
          description: Code gültig – Refresh-Token wird ausgestellt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '400':
          description: Ungültiger oder abgelaufener Code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Nutzer nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Zu viele Versuche
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login/discord/start:
    post:
      summary: Discord OAuth2-Login starten
      description: >
        Erzeugt eine Discord OAuth2 Authorize-URL mit PKCE.
        Der Client öffnet diese URL in einem Browser.
      tags: [Authentication]
      responses:
        '200':
          description: Discord-URL wurde erzeugt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscordStartResponse'

  /auth/login/discord/callback:
    get:
      summary: Discord OAuth2-Callback
      description: >
        Wird von Discord nach erfolgreicher Autorisierung aufgerufen.
        Die API tauscht den Authorization-Code gegen Discord-Tokens,
        prüft die Guild-Mitgliedschaft, sucht den Nutzer in der DB
        und zeigt einen 6-stelligen Pairing-Code an.
        Der Nutzer kopiert diesen Code in die App und verwendet ihn
        am Endpunkt `/auth/login/otp/verify`.
      tags: [Authentication]
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization-Code von Discord
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: State-Parameter (PKCE, Anti-CSRF)
      responses:
        '200':
          description: HTML-Seite mit dem 6-stelligen Pairing-Code
          content:
            text/html:
              schema:
                type: string
                example: "<html>..."
        '400':
          description: Ungültiger oder abgelaufener State / Code

  /auth/register/discord/start:
    post:
      summary: Discord OAuth2-Registrierung starten
      description: >
        Erzeugt eine Discord OAuth2 Authorize-URL mit PKCE für die
        Registrierung eines neuen Kontos. Der Client öffnet diese URL
        in einem Browser. Der Discord-Account darf noch nicht mit einem
        bestehenden Konto verknüpft sein.
      tags: [Authentication]
      responses:
        '200':
          description: Discord-URL wurde erzeugt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscordStartResponse'

  /auth/register/discord/callback:
    get:
      summary: Discord OAuth2-Registrierungs-Callback
      description: >
        Wird von Discord nach erfolgreicher Autorisierung aufgerufen.
        Die API tauscht den Authorization-Code gegen Discord-Tokens,
        prüft die Guild-Mitgliedschaft, erstellt einen neuen Nutzer
        in der DB und zeigt einen 6-stelligen Pairing-Code an.
        Der Nutzer kopiert diesen Code in die App und verwendet ihn
        am Endpunkt `/auth/login/otp/verify`.
      tags: [Authentication]
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization-Code von Discord
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: State-Parameter (PKCE, Anti-CSRF)
      responses:
        '200':
          description: HTML-Seite mit dem 6-stelligen Pairing-Code
          content:
            text/html:
              schema:
                type: string
                example: "<html>..."
        '400':
          description: >
            Ungültiger State, Discord-Account bereits verknüpft,
            E-Mail bereits registriert oder Guild-Mitgliedschaft fehlt

  /auth/refresh:
    post:
      summary: Access-Token erneuern
      description: >
        Tauscht einen gültigen Refresh-Token gegen einen neuen
        Access-Token (JWT) und einen neuen Refresh-Token
        (Token-Rotation). Bei Wiederverwendung eines bereits
        rotierten Tokens wird die gesamte Token-Familie widerrufen.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Neue Tokens wurden ausgestellt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Fehlender Refresh-Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Ungültiger oder abgelaufener Refresh-Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Nutzer nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Zu viele Versuche
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user:
    get:
      summary: Alle Benutzer des Projekts auflisten
      description: >
        Gibt eine Liste aller Benutzer des Projekts zurück.
        Die Sichtbarkeit von E-Mail und Geburtstag wird
        pro Benutzer anhand der Einstellungen des anfragenden Nutzers gefiltert.
      tags: [User]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Liste aller Benutzer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          description: Nicht autorisiert
          content:
