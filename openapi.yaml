openapi: 3.1.0
info:
  title: Sinclear Beyond API
  version: 2.0.0
  description: Zentrale REST-API für Sinclear Beyond

servers:
  - url: /api/v2
    description: API v2

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access-Token (JWT), gültig 15 Minuten

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Fehlercode
        message:
          type: string
          description: Fehlerdetails (nur im Debug-Modus)

    PaginationMeta:
      type: object
      required: [page, limit, total, totalPages]
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 42
        totalPages:
          type: integer
          example: 3

    OtpRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: user@example.com

    OtpVerifyRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: E-Mail (optional bei Discord-Pairing-Codes)
          example: user@example.com
        code:
          type: string
          pattern: '^\d{6}$'
          description: 6-stelliger Code aus E-Mail oder Discord-Callback
          example: '482731'

    DiscordStartResponse:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: Discord OAuth2 Authorize-URL mit PKCE
          example: https://discord.com/api/oauth2/authorize?response_type=code&client_id=...

    OtpSentResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          enum: [otp_sent]
          description: Bestätigung des OTP-Versands

    TokenResponse:
      type: object
      required: [access_token, expires_in, refresh_token, token_type]
      properties:
        access_token:
          type: string
          description: JWT Access-Token
        expires_in:
          type: integer
          description: Gültigkeitsdauer in Sekunden
          example: 900
        refresh_token:
          type: string
          description: Refresh-Token für Token-Erneuerung
        token_type:
          type: string
          enum: [Bearer]

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: Refresh-Token aus vorherigem Login

    RefreshTokenResponse:
      type: object
      required: [refresh_token, expires_at]
      properties:
        refresh_token:
          type: string
          description: Refresh-Token
        expires_at:
          type: integer
          description: Unix-Timestamp, wann der Refresh-Token abläuft

    ExplorePlace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Restaurant Beispiel
        description:
          type: string
          nullable: true
        category:
          type: string
          enum: [gastronomy, leisure]
        address:
          type: string
          nullable: true
        latitude:
          type: number
          format: float
          nullable: true
        longitude:
          type: number
          format: float
          nullable: true
        osmId:
          type: integer
          nullable: true
        osmType:
          type: string
          enum: [N, W, R]
          nullable: true
        phone:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        openingHours:
          type: string
          nullable: true
        cuisine:
          type: string
          nullable: true
          description: Nur bei Gastronomie
        creatorId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        lastUpdated:
          type: string
          format: date-time
        distance:
          type: number
          format: float
          nullable: true
          description: Entfernung in Metern (nur bei Umkreissuche)
        avgRating:
          type: number
          format: float
          nullable: true
          description: Durchschnittsbewertung (nur bei Sortierung nach Rating)
        bookmarkedAt:
          type: string
          format: date-time
          nullable: true
          description: Zeitpunkt des Bookmarks (nur bei Bookmark-Liste)
        _attribution:
          type: string
          description: Quellennachweis für OpenStreetMap-Daten (immer vorhanden)
          example: "© OpenStreetMap contributors"

    BookmarkStatusResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [bookmarked]
          properties:
            bookmarked:
              type: boolean

    BookmarkActionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, bookmarked]
          properties:
            id:
              type: string
              format: uuid
            bookmarked:
              type: boolean

    ExploreCreateRequest:
      type: object
      required: [osmId, osmType]
      properties:
        osmId:
          type: integer
          description: OpenStreetMap-ID des Ortes
          example: 123456789
        osmType:
          type: string
          enum: [N, W, R]
          description: OSM-Objekttyp (Node, Way, Relation)
          example: N

    ExploreListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ExplorePlace'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    ExploreDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/ExplorePlace'

    NewsArticle:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: Neue Technologie-Trends 2026
        url:
          type: string
          format: uri
        sourceName:
          type: string
          example: Heise Online
        sourceIcon:
          type: string
          format: uri
          nullable: true
        imageUrl:
          type: string
          format: uri
          nullable: true
          description: Vorschaubild-URL (nur bei RSS-Artikeln; DB-Artikel immer null)
        description:
          type: string
          nullable: true
          description: Artikel-Beschreibung (nur bei RSS-Artikeln; DB-Artikel immer null)
        savedAt:
          type: string
          format: date-time

    RssArticle:
      type: object
      properties:
        title:
          type: string
          example: Neue Technologie-Trends 2026
        url:
          type: string
          format: uri
        sourceName:
          type: string
          example: Heise Online
        sourceIcon:
          type: string
          format: uri
          nullable: true
        imageUrl:
          type: string
          format: uri
          nullable: true
          description: Vorschaubild-URL aus dem RSS-Feed
        description:
          type: string
          nullable: true
          description: Artikel-Beschreibung aus dem RSS-Feed
        publishedAt:
          type: string
          format: date-time

    NewsListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/NewsArticle'
          description: Gespeicherte Artikel (aus Upvotes)
        rss:
          type: array
          items:
            $ref: '#/components/schemas/RssArticle'
          description: Aktuelle Artikel aus RSS-Quellen (≤7 Tage)
        meta:
          allOf:
            - $ref: '#/components/schemas/PaginationMeta'
            - type: object
              properties:
                rssCount:
                  type: integer
                  description: Anzahl der gelieferten RSS-Artikel

    NewsVoteStatusResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [voted]
          properties:
            voted:
              type: boolean

    NewsVoteActionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, articleId, voted]
          properties:
            id:
              type: string
              format: uuid
            articleId:
              type: string
              format: uuid
            voted:
              type: boolean

    NewsSource:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Heise Online
        url:
          type: string
          format: uri
        itemsPerPage:
          type: integer
          example: 10
        createdAt:
          type: string
          format: date-time

    NewsSourceListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/NewsSource'

    NewsVoteRequest:
      type: object
      required: [url, title, sourceName]
      properties:
        url:
          type: string
          format: uri
          description: URL des Artikels
        title:
          type: string
          description: Titel des Artikels
        sourceName:
          type: string
          description: Name der RSS-Quelle
        sourceIcon:
          type: string
          format: uri
          nullable: true
          description: Icon-URL der Quelle

    NewsVoteDeleteRequest:
      type: object
      required: [articleId]
      properties:
        articleId:
          type: string
          format: uuid
          description: ID des Artikels

    TravelTrip:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Sommerurlaub 2025
        description:
          type: string
          nullable: true
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        hastickets:
          type: string
          enum: ['0', '1']
        ticket:
          type: string
          nullable: true
        ticketUrl:
          type: string
          format: uri
          nullable: true

    TravelTripListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TravelTrip'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    TravelTripDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/TravelTrip'

    TravelEvent:
      type: object
      properties:
        ID:
          type: string
          format: uuid
        trip:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          example: Konzert Berlin
        description:
          type: string
          nullable: true
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        hastickets:
          type: string
          enum: ['0', '1']
        ticket:
          type: string
          nullable: true
        ticketUrl:
          type: string
          format: uri
          nullable: true
        url:
          type: string
          format: uri
          nullable: true
        image:
          type: string
          nullable: true
        organizer:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        latitude:
          type: number
          format: float
          nullable: true
        longitude:
          type: number
          format: float
          nullable: true
        OSMID:
          type: integer
          nullable: true
        participants:
          type: array
          description: Teilnehmer des Events (über EventRelation)
          items:
            $ref: '#/components/schemas/TravelParticipantBrief'

    TravelParticipantBrief:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        image:
          type: string
          nullable: true

    TravelEventListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TravelEvent'

    TravelEventDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/TravelEvent'

    TravelStandaloneEventListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TravelEvent'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    TravelAccommodation:
      type: object
      properties:
        ID:
          type: string
          format: uuid
        name:
          type: string
          example: Hotel Sonnenschein
        description:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        OSMID:
          type: integer
          nullable: true
        latitude:
          type: number
          format: float
          nullable: true
        longitude:
          type: number
          format: float
          nullable: true
        phone:
          type: string
          nullable: true
        mail:
          type: string
          format: email
          nullable: true
        ishotel:
          type: integer
          description: '1 = Hotel, 0 = andere Unterkunft'
        users:
          type: array
          description: Nutzer, die dieser Unterkunft zugeordnet sind (über TravelRelation)
          items:
            $ref: '#/components/schemas/TravelParticipantBrief'

    TravelAccommodationListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TravelAccommodation'

    TravelAccommodationDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/TravelAccommodation'

    TravelParticipant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        image:
          type: string
          nullable: true

    TravelParticipantListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TravelParticipant'

paths:
  /news/proxy/image:
    get:
      summary: Externes Bild laden (Proxy)
      description: >
        Lädt ein Bild von einer externen URL und gibt es als Binär-Response zurück.
        Unterstützt zwei Modi: favicon (3s Timeout, 16KB max) und preview (8s Timeout, 2MB max).
        Nur http/https URLs werden akzeptiert. Interne/private IP-Adressen werden blockiert.
      tags: [News]
      security:
        - BearerAuth: []
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
            format: uri
          description: Die zu ladende externe URL
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [favicon, preview]
            default: favicon
          description: Ladetyp (favicon: 3s Timeout, 16KB max; preview: 8s Timeout, 2MB max)
      responses:
        '200':
          description: Bilddatei im Original-Content-Type
          headers:
            Cache-Control:
              schema:
                type: string
                example: public, max-age=86400
          content:
            image/*:
              schema:
                type: string
                format: binary
        '400':
          description: Ungültige URL, nicht erlaubtes Schema oder keine Bilddatei
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Bild nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate-Limit überschritten (max. 60 Anfragen/Minute)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Timeout oder Fehler beim externen Server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login/otp/request:
    post:
      summary: E-Mail-OTP anfordern
      description: >
        Sendet einen 6-stelligen Code per E-Mail an den Nutzer.
        Der Nutzer muss in der Datenbank existieren. Pro E-Mail
        sind maximal 3 Anfragen pro 60 Sekunden erlaubt.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpRequest'
      responses:
        '200':
          description: OTP-Code wurde versendet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpSentResponse'
        '400':
          description: Ungültige E-Mail-Adresse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Ort nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /news/articles:
    get:
      summary: Artikel auflisten
      description: >
        Gibt eine paginierte Liste der gespeicherten Artikel (data) sowie
        die aktuellsten Artikel aus den konfigurierten RSS-Quellen (rss)
        zurück. Beide Datensätze umfassen maximal die letzten 7 Tage.
        Optional filterbar nach Quellenname. Gespeicherte Artikel
        entstehen durch Upvotes von Nutzern.
      tags: [News]
      security:
        - BearerAuth: []
      parameters:
        - name: sourceName
          in: query
          required: false
          schema:
            type: string
          description: Filter nach RSS-Quelle
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginierte Artikelliste
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsListResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /news/articles/votes:
    get:
      summary: Eigene Upvotes abrufen
      description: >
        Gibt eine paginierte Liste aller Artikel zurück,
        die der angemeldete Nutzer geupvotet hat.
      tags: [News]
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginierte Liste der eigenen Upvotes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsListResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Artikel upvoten
      description: >
        Erstellt einen Upvote für einen Artikel. Existiert der Artikel
        noch nicht in der Datenbank, wird er automatisch angelegt.
        Ein bereits vorhandener Upvote führt zu 409 Conflict.
      tags: [News]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewsVoteRequest'
      responses:
        '201':
          description: Upvote wurde erstellt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsVoteActionResponse'
        '400':
          description: Fehlende Pflichtfelder
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Bereits geupvotet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Upvote entfernen
      description: >
        Entfernt den Upvote des angemeldeten Nutzers für einen Artikel.
      tags: [News]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewsVoteDeleteRequest'
      responses:
        '204':
          description: Upvote wurde entfernt
        '400':
          description: Fehlende articleId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /news/articles/archive:
    get:
      summary: Artikel-Archiv abrufen
      description: >
        Gibt eine paginierte Liste aller Artikel zurück, die älter
        als 7 Tage sind und mindestens einen Upvote erhalten haben.
      tags: [News]
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginierte Archiv-Liste
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsListResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /news/articles/{id}/vote:
    get:
      summary: Vote-Status prüfen
      description: >
        Prüft, ob der angemeldete Nutzer einen bestimmten Artikel
        geupvotet hat.
      tags: [News]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Vote-Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsVoteStatusResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /news/sources:
    get:
      summary: RSS-Quellen auflisten
      description: >
        Gibt eine Liste aller konfigurierten RSS-Quellen zurück.
      tags: [News]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Liste der RSS-Quellen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsSourceListResponse'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Zu viele Anfragen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login/otp/verify:
    post:
      summary: OTP-Code oder Discord-Pairing-Code verifizieren
      description: >
        Prüft den 6-stelligen Code gegen die Datenbank.
        Bei erfolgreicher Prüfung wird ein Refresh-Token ausgestellt.
        Der Code darf nicht älter als 10 Minuten (E-Mail-OTP) bzw.
        2 Minuten (Discord-Pairing) sein und kann nur einmal verwendet werden.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyRequest'
      responses:
        '200':
          description: Code gültig – Refresh-Token wird ausgestellt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '400':
          description: Ungültiger oder abgelaufener Code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Nutzer nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Zu viele Versuche
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login/discord/start:
    post:
      summary: Discord OAuth2-Login starten
      description: >
        Erzeugt eine Discord OAuth2 Authorize-URL mit PKCE.
        Der Client öffnet diese URL in einem Browser.
      tags: [Authentication]
      responses:
        '200':
          description: Discord-URL wurde erzeugt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscordStartResponse'

  /auth/login/discord/callback:
    get:
      summary: Discord OAuth2-Callback
      description: >
        Wird von Discord nach erfolgreicher Autorisierung aufgerufen.
        Die API tauscht den Authorization-Code gegen Discord-Tokens,
        prüft die Guild-Mitgliedschaft, sucht den Nutzer in der DB
        und zeigt einen 6-stelligen Pairing-Code an.
        Der Nutzer kopiert diesen Code in die App und verwendet ihn
        am Endpunkt `/auth/login/otp/verify`.
      tags: [Authentication]
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization-Code von Discord
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: State-Parameter (PKCE, Anti-CSRF)
      responses:
        '200':
          description: HTML-Seite mit dem 6-stelligen Pairing-Code
          content:
            text/html:
              schema:
                type: string
                example: "<html>..."
        '400':
          description: Ungültiger oder abgelaufener State / Code

  /auth/refresh:
    post:
      summary: Access-Token erneuern
      description: >
        Tauscht einen gültigen Refresh-Token gegen einen neuen
        Access-Token (JWT) und einen neuen Refresh-Token
        (Token-Rotation). Bei Wiederverwendung eines bereits
        rotierten Tokens wird die gesamte Token-Familie widerrufen.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Neue Tokens wurden ausgestellt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Fehlender Refresh-Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Ungültiger oder abgelaufener Refresh-Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Nutzer nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Zu viele Versuche
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /explore:
    get:
      summary: Orte auflisten
      description: >
        Gibt eine paginierte Liste aller Entdecken-Orte zurück.
        Optional filterbar nach Kategorie.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [gastronomy, leisure]
          description: Filter nach Kategorie
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [name_asc, name_desc, created_asc, created_desc, rating_asc, rating_desc]
          description: Sortierung der Ergebnisse
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginierte Liste der Orte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreListResponse'
        '400':
          description: Ungültige Kategorie oder Sortierung
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert (fehlender oder ungültiger Token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Neuen Ort anlegen
      description: >
        Legt einen neuen Entdecken-Ort an. Der Client übergibt die
        OSM-ID und den OSM-Typ. Die API ruft die Detaildaten
        von Nominatim/OpenStreetMap ab, bestimmt die Kategorie
        automatisch und speichert den Ort.
      tags: [Explore]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExploreCreateRequest'
      responses:
        '201':
          description: Ort wurde angelegt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreDetailResponse'
        '400':
          description: Ungültige OSM-ID oder OSM-Typ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Ort existiert bereits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /explore/search:
    get:
      summary: Orte durchsuchen
      description: >
        Durchsucht die Entdecken-Orte nach Namen, Kategorie, Küche
        oder geografischer Lage. Die Umkreissuche verwendet die
        Haversine-Formel. Alternativ kann ein Ortsname (`location`)
        übergeben werden, der automatisch über Nominatim geocoded wird.
      tags: [Explore]
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Volltextsuche im Namen
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [gastronomy, leisure]
        - name: cuisine
          in: query
          required: false
          schema:
            type: string
          description: Küchen-Typ (nur bei Gastronomie)
        - name: lat
          in: query
          required: false
          schema:
            type: number
            format: float
          description: Breitengrad für Umkreissuche
        - name: lon
          in: query
          required: false
          schema:
            type: number
            format: float
          description: Längengrad für Umkreissuche
        - name: location
          in: query
          required: false
          schema:
            type: string
          description: Ortsname (wird automatisch geocoded)
        - name: radius
          in: query
          required: false
          schema:
            type: integer
            default: 5000
            minimum: 1
            maximum: 50000
          description: Radius in Metern
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Suchergebnisse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreListResponse'
        '400':
          description: Ungültige Parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

