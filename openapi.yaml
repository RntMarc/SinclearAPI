openapi: 3.1.0
info:
  title: Sinclear Beyond API
  version: 1.0.0
  description: Zentrale REST-API für Sinclear Beyond
servers:
  - url: /api/v1
    description: API v1

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    PaginationMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }

    TokenResponse:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn: { type: integer }
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        displayName: { type: string }
        isAdmin: { type: boolean }
        onboardingCompleted: { type: boolean }
        image: { type: string, nullable: true }
        preferences:
          type: object
          nullable: true
          properties:
            theme: { type: string, enum: [light, dark] }
            language: { type: string }
            primaryColor: { type: string }
            timezone: { type: string, nullable: true }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    OtpRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    OtpVerify:
      type: object
      required: [email, code]
      properties:
        email: { type: string, format: email }
        code: { type: string, minLength: 6, maxLength: 6 }

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }

    PollVoteRequest:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          items:
            type: object
            properties:
              questionId: { type: string }
              optionId: { type: string }
              availability: { type: string, enum: [yes, maybe, no] }
              textValue: { type: string }

    ChatMessageRequest:
      type: object
      required: [chat_id, body]
      properties:
        chat_id: { type: string }
        chat_type: { type: string, enum: [direct, group], default: direct }
        body: { type: string }
        attachment_type: { type: string, nullable: true }
        attachment_body: { type: string, nullable: true }

    Event:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        startAt: { type: string, format: date-time }
        endAt: { type: string, format: date-time, nullable: true }
        allDay: { type: integer }
        isPublic: { type: integer }
        createdAt: { type: string, format: date-time }
        creatorId: { type: string }

  parameters:
    id:
      name: id
      in: path
      required: true
      schema: { type: string }
    page:
      name: page
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
    limit:
      name: limit
      in: query
      schema: { type: integer, default: 25, minimum: 1, maximum: 100 }

security:
  - bearerAuth: []

paths:
  # --- Auth ---
  /auth/login:
    post:
      security: []
      tags: [Auth]
      summary: Login mit E-Mail und Passwort
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Login erfolgreich
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '400': { description: Ungültige Zugangsdaten }

  /auth/otp/request:
    post:
      security: []
      tags: [Auth]
      summary: OTP per E-Mail anfordern
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OtpRequest' }
      responses:
        '200': { description: OTP gesendet }
        '400': { description: Fehler, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '429': { description: Rate Limit }

  /auth/otp/verify:
    post:
      security: []
      tags: [Auth]
      summary: OTP verifizieren und einloggen
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OtpVerify' }
      responses:
        '200':
          description: Login erfolgreich
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }

  /auth/passkey/login/begin:
    post:
      security: []
      tags: [Auth]
      summary: Passkey-Login starten
      responses:
        '200': { description: WebAuthn Options }

  /auth/passkey/login/finish:
    post:
      security: []
      tags: [Auth]
      summary: Passkey-Login abschließen
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }

  /auth/passkey/register/begin:
    post:
      tags: [Auth]
      summary: Passkey registrieren (begin)
      responses:
        '200': { description: WebAuthn Options }

  /auth/passkey/register/finish:
    post:
      tags: [Auth]
      summary: Passkey registrieren (finish)
      responses:
        '200': { description: Erfolg }

  /auth/passkey/list:
    get:
      tags: [Auth]
      summary: Registrierte Passkeys auflisten
      responses:
        '200':
          description: Liste der Passkeys
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        createdAt: { type: string }
                        lastUsedAt: { type: string, nullable: true }

  /auth/passkey/{id}:
    delete:
      tags: [Auth]
      summary: Passkey löschen
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        '204': { description: Gelöscht }

  /auth/passkey/delete/{id}:
    delete:
      tags: [Auth]
      summary: Passkey löschen (Alias)
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        '204': { description: Gelöscht }

  /auth/discord/start:
    get:
      security: []
      tags: [Auth]
      summary: Discord OAuth2 starten
      responses:
        '302': { description: Redirect zu Discord }

  /auth/discord/callback:
    get:
      security: []
      tags: [Auth]
      summary: Discord OAuth2 Callback
      parameters:
        - name: code
          in: query
          schema: { type: string }
        - name: state
          in: query
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }

  /auth/refresh:
    post:
      security: []
      tags: [Auth]
      summary: Access Token erneuern
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200': { description: Neue Tokens }

  /auth/logout:
    post:
      security: []
      tags: [Auth]
      summary: Ausloggen (Refresh Token invalidieren)
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200': { description: Erfolg }

  /auth/me:
    get:
      tags: [Auth]
      summary: Aktuellen Nutzer abrufen
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }

  # --- Users ---
  /users:
    get:
      tags: [Users]
      summary: Nutzer listen (Admin)
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200': { description: Paginierte Liste }
    post:
      tags: [Users]
      summary: Nutzer anlegen (Admin)
      responses:
        '201': { description: Erstellt }

  /users/{id}:
    get:
      tags: [Users]
      summary: Nutzer abrufen
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        '200': { description: Nutzer }
    put:
      tags: [Users]
      summary: Nutzer aktualisieren
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        '200': { description: Aktualisiert }
    patch:
      tags: [Users]
      summary: Nutzer aktualisieren (Patch)
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        '200': { description: Aktualisiert }
    delete:
      tags: [Users]
      summary: Nutzer löschen (Admin)
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        '204': { description: Gelöscht }

  /users/{id}/export:
    get:
      tags: [Users]
      summary: DSGVO-Datenexport
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        '200': { description: Exportdaten }

  /user-preferences:
    get: { tags: [Users], summary: Alle Präferenzen }
    post: { tags: [Users], summary: Präferenz erstellen }
  /user-preferences/{id}:
    get: { tags: [Users] }
    put: { tags: [Users] }
    patch: { tags: [Users] }
    delete: { tags: [Users] }

  /contact-info:
    get: { tags: [Users], summary: Alle Kontaktinfos }
    post: { tags: [Users], summary: Kontaktinfo erstellen }
  /contact-info/{id}:
    get: { tags: [Users] }
    put: { tags: [Users] }
    patch: { tags: [Users] }
    delete: { tags: [Users] }

  /social-info:
    get: { tags: [Users], summary: Alle Social Infos }
    post: { tags: [Users], summary: Social Info erstellen }
  /social-info/{id}:
    get: { tags: [Users] }
    put: { tags: [Users] }
    patch: { tags: [Users] }
    delete: { tags: [Users] }

  /close-friends:
    get: { tags: [Users], summary: Alle engen Freunde (die ich markiert habe) }
    post: { tags: [Users], summary: Engen Freund hinzufügen }
  /close-friends/incoming:
    get:
      tags: [Users]
      summary: Wer mich als engen Freund markiert hat
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        userId: { type: string }
                        friendId: { type: string }
                        createdAt: { type: string }
  /close-friends/{id}:
    get: { tags: [Users] }
    put: { tags: [Users] }
    patch: { tags: [Users] }
    delete: { tags: [Users] }

  /close-friends/{userId}/{friendId}:
    get:
      tags: [Users]
      summary: Prüfen ob ein Nutzer ein enger Freund ist
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: friendId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  isCloseFriend: { type: boolean }
    post:
      tags: [Users]
      summary: Engen Freund hinzufügen
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: friendId
          in: path
          required: true
          schema: { type: string }
      responses:
        '201':
          description: Freund hinzugefügt
    delete:
      tags: [Users]
      summary: Engen Freund entfernen
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
        - name: friendId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Freund entfernt

  /subscriptions/user/{userId}:
    get:
      tags: [Users]
      summary: Abonnements eines Nutzers abrufen
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Liste der Abonnements }

  # --- Events ---
  /events:
    post:
      tags: [Events]
      summary: Event erstellen
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [title, startAt]
              properties:
                title: { type: string }
                description: { type: string, nullable: true }
                startAt: { type: string, format: date-time }
                endAt: { type: string, format: date-time, nullable: true }
                allDay: { type: boolean, default: false }
                isPublic: { type: boolean, default: true }
      responses:
        '201':
          description: Erstellt
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Event' }

  /events/{id}:
    put:
      tags: [Events]
      parameters: [{ $ref: '#/components/parameters/id' }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string, nullable: true }
                startAt: { type: string, format: date-time }
                endAt: { type: string, format: date-time, nullable: true }
                allDay: { type: boolean }
                isPublic: { type: boolean }
      responses:
        '200':
          description: Aktualisiert
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Event' }
    patch:
      tags: [Events]
      parameters: [{ $ref: '#/components/parameters/id' }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string, nullable: true }
                startAt: { type: string, format: date-time }
                endAt: { type: string, format: date-time, nullable: true }
                allDay: { type: boolean }
                isPublic: { type: boolean }
      responses:
        '200':
          description: Aktualisiert
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Event' }
    delete:
      tags: [Events]
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        '200':
          description: Gelöscht
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

  /events/{id}/permissions:
    get:
      tags: [Events]
      summary: Berechtigungen eines Events auflisten
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        '200':
          description: Liste der Berechtigungen
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    userId: { type: string }
                    canView: { type: integer }
                    canEdit: { type: integer }
                    displayName: { type: string }
                    email: { type: string }
    post:
      tags: [Events]
      summary: Berechtigungen für ein Event setzen (ersetzt alle)
      parameters: [{ $ref: '#/components/parameters/id' }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                permissions:
                  type: array
                  items:
                    type: object
                    properties:
                      userId: { type: string }
                      canView: { type: boolean }
                      canEdit: { type: boolean }
      responses:
        '200':
          description: Gespeichert
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

  /event-permissions:
    get: { tags: [Events], summary: Alle Berechtigungen }
    post: { tags: [Events], summary: Berechtigung erstellen }
  /event-permissions/{id}:
    get: { tags: [Events] }
    put: { tags: [Events] }
    patch: { tags: [Events] }
    delete: { tags: [Events] }

  /event-relations:
    get: { tags: [Events], summary: Alle Relationen }
    post: { tags: [Events], summary: Relation erstellen }
  /event-relations/{id}:
    get: { tags: [Events] }
    put: { tags: [Events] }
    patch: { tags: [Events] }
    delete: { tags: [Events] }

  # --- Polls ---
  /polls:
    get: { tags: [Polls], summary: Umfragen listen }
    post: { tags: [Polls], summary: Umfrage erstellen }
  /polls/{id}:
    get: { tags: [Polls] }
    put: { tags: [Polls] }
    patch: { tags: [Polls] }
    delete: { tags: [Polls] }

  /polls/{id}/vote:
    post:
      tags: [Polls]
      summary: In Umfrage abstimmen (Alias)
      parameters: [{ $ref: '#/components/parameters/id' }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PollVoteRequest' }
      responses:
        '200': { description: Erfolg }

  /polls/{id}/votes:
    post:
      tags: [Polls]
      summary: In Umfrage abstimmen
      parameters: [{ $ref: '#/components/parameters/id' }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PollVoteRequest' }
      responses:
        '200': { description: Erfolg }

  /polls/{id}/counter-proposals:
    post:
      tags: [Polls]
      summary: Gegenvorschlag einreichen
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        '201': { description: Erstellt }

  /polls/{id}/finalize:
    post:
      tags: [Polls]
      summary: Umfrage finalisieren
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        '200': { description: Finalisiert }

  /poll-questions:
    get: { tags: [Polls] }
    post: { tags: [Polls] }
  /poll-questions/{id}:
    get: { tags: [Polls] }
    put: { tags: [Polls] }
    patch: { tags: [Polls] }
    delete: { tags: [Polls] }

  /poll-options:
    get: { tags: [Polls] }
    post: { tags: [Polls] }
  /poll-options/{id}:
    get: { tags: [Polls] }
    put: { tags: [Polls] }
    patch: { tags: [Polls] }
    delete: { tags: [Polls] }

  /poll-invites:
    get: { tags: [Polls] }
    post: { tags: [Polls] }
  /poll-invites/{id}:
    get: { tags: [Polls] }
    put: { tags: [Polls] }
    patch: { tags: [Polls] }
    delete: { tags: [Polls] }

  /poll-votes:
    get: { tags: [Polls] }
    post: { tags: [Polls] }
  /poll-votes/{id}:
    get: { tags: [Polls] }
    put: { tags: [Polls] }
    patch: { tags: [Polls] }
    delete: { tags: [Polls] }

  # --- Chat ---
  /chat/rooms:
    get:
      tags: [Chat]
      summary: Chat-Räume des Nutzers
      responses:
        '200': { description: Räume }

  /chat/messages:
    get:
      tags: [Chat]
      summary: Nachrichten abrufen
      parameters:
        - name: chat_id
          in: query
          required: true
          schema: { type: string }
        - name: chat_type
          in: query
          schema: { type: string, enum: [direct, group] }
      responses:
        '200': { description: Nachrichten }
    post:
      tags: [Chat]
      summary: Nachricht senden
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChatMessageRequest' }
      responses:
        '201': { description: Gesendet }

  /chat/read:
    post:
      tags: [Chat]
      summary: Als gelesen markieren
      responses:
        '200': { description: Erfolg }

  /chat/unread:
    get:
      tags: [Chat]
      summary: Ungelesene Zähler
      responses:
        '200': { description: Counts }

  /chat/direct:
    get:
      tags: [Chat]
      summary: Direktchat abrufen/erstellen
      parameters:
        - name: user_id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200': { description: Direct Chat }
    post:
      tags: [Chat]
      summary: Direktchat erstellen
      parameters:
        - name: user_id
          in: query
          required: true
          schema: { type: string }
      responses:
        '201': { description: Erstellt }

  /chat/presence:
    get:
      tags: [Chat]
      summary: Präsenz abrufen
      responses:
        '200': { description: Präsenz }
    patch:
      tags: [Chat]
      summary: Präsenz aktualisieren
      responses:
        '200': { description: Aktualisiert }

  /chat/events/stream:
    get:
      tags: [Chat]
      summary: SSE Event-Stream
      responses:
        '200':
          description: text/event-stream
          content:
            text/event-stream:
              schema: { type: string }

  # --- Recipes ---
  /recipes:
    get: { tags: [Recipes], summary: Rezepte listen }
    post: { tags: [Recipes], summary: Rezept erstellen }
  /recipes/{id}:
    get: { tags: [Recipes] }
    put: { tags: [Recipes] }
    patch: { tags: [Recipes] }
    delete: { tags: [Recipes] }

  /recipe-ingredients:
    get: { tags: [Recipes] }
    post: { tags: [Recipes] }
  /recipe-ingredients/{id}:
    get: { tags: [Recipes] }
    put: { tags: [Recipes] }
    patch: { tags: [Recipes] }
    delete: { tags: [Recipes] }

  /recipe-steps:
    get: { tags: [Recipes] }
    post: { tags: [Recipes] }
  /recipe-steps/{id}:
    get: { tags: [Recipes] }
    put: { tags: [Recipes] }
    patch: { tags: [Recipes] }
    delete: { tags: [Recipes] }

  /recipe-reviews:
    get: { tags: [Recipes] }
    post: { tags: [Recipes] }
  /recipe-reviews/{id}:
    get: { tags: [Recipes] }
    put: { tags: [Recipes] }
    patch: { tags: [Recipes] }
    delete: { tags: [Recipes] }

  /recipes/reviews:
    get: { tags: [Recipes], summary: Alle Bewertungen }
  /recipes/reviews/{id}:
    get: { tags: [Recipes] }
    put: { tags: [Recipes] }
    patch: { tags: [Recipes] }
    delete: { tags: [Recipes] }

  /recipe-bookmarks:
    get: { tags: [Recipes] }
    post: { tags: [Recipes] }
  /recipe-bookmarks/{id}:
    get: { tags: [Recipes] }
    put: { tags: [Recipes] }
    patch: { tags: [Recipes] }
    delete: { tags: [Recipes] }

  /recipes/bookmarks:
    get: { tags: [Recipes], summary: Alle Lesezeichen }
  /recipes/bookmarks/{id}:
    get: { tags: [Recipes] }
    put: { tags: [Recipes] }
    patch: { tags: [Recipes] }
    delete: { tags: [Recipes] }

  # --- Media ---
  /media-items:
    get: { tags: [Media] }
    post: { tags: [Media] }
  /media-items/{id}:
    get: { tags: [Media] }
    put: { tags: [Media] }
    patch: { tags: [Media] }
    delete: { tags: [Media] }

  /media-reviews:
    get: { tags: [Media] }
    post: { tags: [Media] }
  /media-reviews/{id}:
    get: { tags: [Media] }
    put: { tags: [Media] }
    patch: { tags: [Media] }
    delete: { tags: [Media] }

  /series-episodes:
    get: { tags: [Media] }
    post: { tags: [Media] }
  /series-episodes/{id}:
