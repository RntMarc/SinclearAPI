            type: number
            format: double
          description: Längengrad
        - name: acc
          in: query
          schema:
            type: number
            format: double
          description: GPS-Genauigkeit in Metern
        - name: timestamp
          in: query
          schema:
            type: integer
          description: Unix-Epoch Timestamp in Sekunden
      responses:
