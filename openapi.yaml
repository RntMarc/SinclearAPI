        '403':
          description: Kein Admin-Recht
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Forum nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

