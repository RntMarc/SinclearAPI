        '404':
          description: Vorschlag nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Upvote bereits vorhanden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Upvote zurückziehen
      description: >
