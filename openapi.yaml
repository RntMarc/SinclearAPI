        - name: commentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID des Kommentars
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackCommentUpdateRequest'
      responses:
        '200':
          description: Kommentar erfolgreich aktualisiert
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/FeedbackComment'
        '400':
          description: Ungültige Eingabe (z.B. leerer Text)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Kein Recht zum Bearbeiten (nicht Eigentümer oder Zeitfenster abgelaufen)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Kommentar nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Kommentar löschen
      description: >
        Löscht einen Kommentar. Wenn der Kommentar Antworten hat, wird nur der
        Inhalt gelöscht (Soft-Delete). Ohne Antworten wird der Eintrag komplett
        entfernt (Hard-Delete). Der Eigentümer und Administratoren dürfen löschen.
      tags: [Feedback]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID des Vorschlags
        - name: commentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID des Kommentars
      responses:
        '204':
          description: Kommentar erfolgreich gelöscht
        '401':
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Kein Recht zum Löschen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Kommentar nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /trips/{id}/accommodations:
