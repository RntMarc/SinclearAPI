      description: >
        Gibt alle Unterkünfte zurück, die von Teilnehmern einer Reise
        genutzt werden. Der Nutzer muss selbst Teilnehmer der Reise sein.
      tags: [Travel]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Liste der Unterkünfte
          content:
            application/json:
              schema:
